<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Casino Royale Wheel</title>
    <style>
        body { 
            background: linear-gradient(135deg, #1a0a00 0%, #4a0000 50%, #1a0a00 100%); 
            color: #ffca28; text-align: center; font-family: 'Cairo', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; 
        }
        .wheel-container { position: relative; margin-top: 20px; }
        .pointer { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 50px; color: #ffca28; text-shadow: 0 0 15px #000; z-index: 10; }
        #wheel { border: 12px solid #5a3d00; border-radius: 50%; box-shadow: 0 0 50px rgba(255,202,40,0.5); transition: transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
        #spinBtn { background: #b71c1c; border: 3px solid #ffca28; color: #fff; padding: 15px 40px; font-size: 22px; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 15px #000; margin-top: 20px; }
        #result-text { margin-top: 20px; font-size: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🎡 عجلة مطعم الفنان 🎡</h1>
    <div class="wheel-container">
        <div class="pointer">▼</div>
        <canvas id="wheel" width="350" height="350"></canvas>
    </div>
    <button id="spinBtn">دَوّر واربح!</button>
    <div id="result-text">انتظر الحظ!</div>

    <script>
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const resultDiv = document.getElementById("result-text");
        let rotation = 0;
        
        const prizes = [
            { text: "تخفيض 25%", color: "#c8930a" }, { text: "ارجع غدوة", color: "#5a5a5a" },
            { text: "إضافة فريت", color: "#c97400" }, { text: "دور مرة أخرى", color: "#2e7d32" },
            { text: "ارجع غدوة", color: "#484848" }, { text: "إضافة فريت", color: "#e65100" },
            { text: "قازوزة مجانية", color: "#880e4f" }, { text: "ارجع غدوة", color: "#404040" },
            { text: "إضافة فريت", color: "#bf360c" }, { text: "دابوزة ماء", color: "#0d47a1" },
            { text: "ارجع غدوة", color: "#383838" }, { text: "تخفيض 50%", color: "#6a1b9a" }
        ];

        function drawWheel() {
            const sliceAngle = (2 * Math.PI) / prizes.length;
            prizes.forEach((p, i) => {
                ctx.beginPath();
                ctx.moveTo(175, 175);
                ctx.arc(175, 175, 160, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fillStyle = p.color; ctx.fill(); ctx.stroke();
                ctx.save(); ctx.translate(175, 175);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.textAlign = "right"; ctx.fillStyle = "#fff"; ctx.font = "bold 13px Arial";
                ctx.fillText(p.text, 140, 5); ctx.restore();
            });
        }
        drawWheel();

        document.getElementById("spinBtn").onclick = () => {
            resultDiv.innerText = "⏳ جاري التدوير...";
            const randomAngle = Math.floor(Math.random() * 3600) + 1800;
            rotation += randomAngle;
            canvas.style.transform = `rotate(${rotation}deg)`;
            
            setTimeout(() => {
                const finalDegree = rotation % 360;
                const degreesPerSlice = 360 / prizes.length;
                const index = Math.floor(((360 - finalDegree + 90) % 360) / degreesPerSlice) % prizes.length;
                resultDiv.innerText = "🎉 مبروك! ربحت: " + prizes[index].text;
            }, 5000);
        };
    </script>
</body>
</html>
