<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عجلة مطعم الفنان</title>
    <style>
        body { background: #1a0a00; color: #ffca28; text-align: center; font-family: 'Cairo', sans-serif; }
        
        /* حاوية العجلة */
        .wheel-container { position: relative; width: 300px; height: 300px; margin: 50px auto; }
        
        #wheel {
            width: 100%; height: 100%; border-radius: 50%;
            border: 10px solid #ffca28;
            position: relative; overflow: hidden;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            /* تقسيم الألوان */
            background: conic-gradient(
                #b71c1c 0deg 60deg, #ff6f00 60deg 120deg, 
                #b71c1c 120deg 180deg, #ff6f00 180deg 240deg,
                #b71c1c 240deg 300deg, #ff6f00 300deg 360deg
            );
        }

        /* النصوص داخل الشرائح */
        .segment {
            position: absolute; width: 50%; height: 50%;
            transform-origin: 100% 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; color: white;
            left: 0; top: 0;
        }

        /* توزيع النصوص في الزوايا */
        .s1 { transform: rotate(30deg); }
        .s2 { transform: rotate(90deg); }
        .s3 { transform: rotate(150deg); }
        .s4 { transform: rotate(210deg); }
        .s5 { transform: rotate(270deg); }
        .s6 { transform: rotate(330deg); }

        button { padding: 15px 40px; font-size: 20px; border-radius: 30px; border: none; background: #ffca28; cursor: pointer; }
    </style>
</head>
<body>

    <h1>مطعم الفنان 🎡</h1>
    
    <div class="wheel-container">
        <div id="wheel">
            <div class="segment s1">ارجع غدوة</div>
            <div class="segment s2">تخفيض 50%</div>
            <div class="segment s3">تخفيض 25%</div>
            <div class="segment s4">اضافة فريت</div>
            <div class="segment s5">قازوزة</div>
            <div class="segment s6">عاود دور</div>
        </div>
    </div>

    <button onclick="spin()">دَوّر!</button>

    <script>
        let rotation = 0;
        function spin() {
            const wheel = document.getElementById("wheel");
            rotation += 1800 + Math.floor(Math.random() * 360);
            wheel.style.transform = `rotate(${rotation}deg)`;
        }
    </script>
</body>
</html>
