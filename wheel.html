  </div>
</div>

<button class="spin-btn" id="spinBtn">🔥 دوّر العجلة</button>
<div id="result"></div>

<script>
const segments = [
  { label: "25% Remise",   color: "#ff7b00" },
  { label: "50% Remise",   color: "#e53935" },
  { label: "عاود داور",     color: "#1e88e5" },
  { label: "هز بلاش",      color: "#616161" },
  { label: "Portion Frite",color: "#7b1fa2" },
  { label: "Gezouza",      color: "#c62828" },
  { label: "Debouza Me",   color: "#43a047" },
  { label: "هز بلاش",      color: "#455a64" },
  { label: "Portion Blech",color: "#f9a825" }
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const size = canvas.width;
const radius = size / 2;
const N = segments.length;
const arc = (Math.PI * 2) / N;

function drawWheel() {
  for (let i = 0; i < N; i++) {
    const start = i * arc - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(radius, radius);
    ctx.arc(radius, radius, radius, start, start + arc);
    ctx.fillStyle = segments[i].color;
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,.3)";
    ctx.stroke();

    ctx.save();
    ctx.translate(radius, radius);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "#fff";
    ctx.font = "bold 20px Cairo, sans-serif";
    ctx.shadowColor = "rgba(0,0,0,.6)";
    ctx.shadowBlur = 4;
    ctx.fillText(segments[i].label, radius - 18, 6);
    ctx.restore();
  }
}
drawWheel();

let currentRotation = 0;
const btn = document.getElementById("spinBtn");
const result = document.getElementById("result");

btn.addEventListener("click", () => {
  btn.disabled = true;
  result.textContent = "";

  const winIndex = Math.floor(Math.random() * N);
  const turns = 5 + Math.floor(Math.random() * 3);
  const anglePerSeg = 360 / N;
  const targetAngle = 360 - (winIndex * anglePerSeg) - anglePerSeg / 2;
  const finalRotation = turns * 360 + targetAngle;

  currentRotation += finalRotation;
  canvas.style.transform = `rotate(${currentRotation}deg)`;

  setTimeout(() => {
    result.textContent = "🎉 " + segments[winIndex].label;
    btn.disabled = false;
  }, 6100);
});
</script>
