<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>عجلة الحظ - الفنان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      overflow: hidden;
      color: white;
      position: relative;
      direction: rtl;
      background: #111;
    }

    /* Background */
    .bg {
      position: fixed; inset: -5%; z-index: -2;
      background:
        linear-gradient(rgba(0,0,0,.80),rgba(0,0,0,.80)),
        url('unnamed (2).jpg');
      background-size: cover; background-position: center;
      animation: bgZoom 22s ease-in-out infinite alternate;
    }
    .bg::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 45%, rgba(255,140,0,.32), transparent 62%);
      animation: pulse 5s ease-in-out infinite alternate;
    }
    @keyframes bgZoom {
      0%   { transform: scale(1)    translate(0,0);     }
      100% { transform: scale(1.15) translate(-2%,-1%); }
    }
    @keyframes pulse { 0% { opacity:.3; } 100% { opacity:1; } }

    /* Sparks */
    .spark {
      position: fixed; bottom: -20px; width: 6px; height: 6px;
      border-radius: 50%; background: #ffcc33;
      box-shadow: 0 0 12px #ff7b00; z-index: -1; opacity: 0;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(0)      scale(1);  opacity: 0; }
      10%  { opacity: .9; }
      100% { transform: translateY(-110vh) scale(.3); opacity: 0; }
    }

    /* Floating stars */
    .star {
      position: fixed; opacity: 0; z-index: -1;
      animation: floatStar linear infinite;
    }
    @keyframes floatStar {
      0%   { transform: translateY(0)      rotate(0deg)   scale(1);  opacity: 0; }
      15%  { opacity: .7; }
      85%  { opacity: .5; }
      100% { transform: translateY(-100vh) rotate(360deg) scale(.4); opacity: 0; }
    }

    /* Wheel wrapper */
    .wheel-wrapper {
      position: relative; width: 380px; height: 380px;
      display: flex; justify-content: center; align-items: center;
    }
    .pointer {
      position: absolute; top: -22px; font-size: 55px; z-index: 99;
      color: #ff1e1e; filter: drop-shadow(0 0 8px black);
      animation: glow 1s infinite alternate;
    }
    #wheel {
      width: 100%; height: 100%; border-radius: 50%;
      border: 10px solid #ffcc33; background: #111;
      box-shadow: 0 0 20px rgba(255,204,51,.8), 0 0 50px rgba(255,136,0,.5);
      transition: transform 6s cubic-bezier(.17,.67,.12,.99);
    }
    .center-logo {
      position: absolute; width: 115px; height: 115px; border-radius: 50%;
      background: #fff; border: 6px solid #ffcc33; z-index: 50; overflow: hidden;
      display: flex; justify-content: center; align-items: center;
      animation: logoPulse 2.5s ease-in-out infinite;
    }
    .center-logo img { width: 100%; height: 100%; object-fit: cover; }
    @keyframes logoPulse {
      0%,100% { box-shadow: 0 0 20px rgba(255,204,51,.6); }
      50%      { box-shadow: 0 0 35px rgba(255,204,51,1), 0 0 55px rgba(255,123,0,.6); }
    }
    @keyframes glow {
      from { filter: drop-shadow(0 0 5px #fff);    }
      to   { filter: drop-shadow(0 0 20px #ffcc33); }
    }

    /* Spin button */
    .spin-btn {
      margin-top: 28px; padding: 15px 50px; border: none; border-radius: 50px;
      font-size: 22px; font-weight: 900; cursor: pointer; font-family: 'Cairo', sans-serif;
      background: linear-gradient(45deg, #ff1e1e, #ff7b00); color: white;
      box-shadow: 0 0 24px rgba(255,87,34,.8); transition: .3s;
      position: relative; overflow: hidden;
    }
    .spin-btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(120deg,transparent 30%,rgba(255,255,255,.25) 50%,transparent 70%);
      transform: translateX(-100%);
      animation: shimmer 2.5s infinite;
    }
    @keyframes shimmer { 100% { transform: translateX(200%); } }
    .spin-btn:hover { transform: scale(1.08); box-shadow: 0 0 35px rgba(255,87,34,1); }
    .spin-btn:disabled { opacity:.5; cursor:not-allowed; }
    .spin-btn:disabled::after { display:none; }

    /* Result */
    #result {
      margin-top: 18px; font-size: 28px; font-weight: 900;
      min-height: 44px; color: #ffcc33;
      text-shadow: 0 0 14px rgba(255,204,51,.9);
      text-align: center;
    }
    .result-show { animation: resultBounce .6s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes resultBounce {
      0%,100% { transform: scale(1);   }
      20%     { transform: scale(1.3); }
      40%     { transform: scale(.9);  }
      60%     { transform: scale(1.1); }
      80%     { transform: scale(.97); }
    }

    /* Confetti */
    .confetti-piece {
      position: fixed; top: -10px; border-radius: 3px; opacity: 0; z-index: 999;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0)      rotate(0deg)   scaleX(1);  opacity: 1; }
      80%  { opacity: .8; }
      100% { transform: translateY(105vh)  rotate(720deg) scaleX(.3); opacity: 0; }
    }

    @media (max-width: 500px) {
      .wheel-wrapper { width: 300px; height: 300px; }
      .center-logo { width: 90px; height: 90px; border-width: 5px; }
      .spin-btn { font-size: 20px; padding: 13px 32px; }
      #result { font-size: 22px; }
    }
  </style>
</head>
<body>

  <audio id="bgMusic" loop>
    <source src="sanfara.mp3" type="audio/mpeg">
  </audio>

  <div class="bg"></div>

  <!-- Sparks -->
  <div class="spark" style="left:5%;animation-duration:9s;animation-delay:0s"></div>
  <div class="spark" style="left:14%;animation-duration:13s;animation-delay:1.5s"></div>
  <div class="spark" style="left:24%;animation-duration:11s;animation-delay:2s"></div>
  <div class="spark" style="left:37%;animation-duration:8s;animation-delay:4s"></div>
  <div class="spark" style="left:50%;animation-duration:14s;animation-delay:0.5s"></div>
  <div class="spark" style="left:62%;animation-duration:10s;animation-delay:3s"></div>
  <div class="spark" style="left:73%;animation-duration:12s;animation-delay:1s"></div>
  <div class="spark" style="left:83%;animation-duration:9s;animation-delay:5s"></div>
  <div class="spark" style="left:91%;animation-duration:11s;animation-delay:2.5s"></div>
  <div class="spark" style="left:96%;animation-duration:8s;animation-delay:6s"></div>

  <!-- Floating stars -->
  <div class="star" style="left:8%;bottom:-20px;animation-duration:10s;animation-delay:0s;font-size:16px">⭐</div>
  <div class="star" style="left:20%;bottom:-20px;animation-duration:11.5s;animation-delay:1.3s;font-size:22px">✨</div>
  <div class="star" style="left:32%;bottom:-20px;animation-duration:13s;animation-delay:2.6s;font-size:16px">🌟</div>
  <div class="star" style="left:44%;bottom:-20px;animation-duration:14.5s;animation-delay:3.9s;font-size:22px">💫</div>
  <div class="star" style="left:56%;bottom:-20px;animation-duration:16s;animation-delay:5.2s;font-size:16px">⭐</div>
  <div class="star" style="left:68%;bottom:-20px;animation-duration:17.5s;animation-delay:6.5s;font-size:22px">✨</div>
  <div class="star" style="left:80%;bottom:-20px;animation-duration:19s;animation-delay:7.8s;font-size:16px">🌟</div>
  <div class="star" style="left:92%;bottom:-20px;animation-duration:20.5s;animation-delay:9.1s;font-size:22px">💫</div>

  <!-- Confetti container -->
  <div id="confetti-container"></div>

  <!-- Wheel -->
  <div class="wheel-wrapper">
    <div class="pointer">▼</div>
    <canvas id="wheel" width="500" height="500"></canvas>
    <div class="center-logo">
      <img src="735043823_122232458936380788_691619389420209673_n (3).jpg" alt="Logo"/>
    </div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">🔥 دوّر العجلة</button>
  <div id="result"></div>

  <script>
    const segments = [
      { label: "25% Remise",    color: "#ff7b00" }, // 0
      { label: "50% Remise",    color: "#e53935" }, // 1
      { label: "عاود داور",     color: "#1e88e5" }, // 2
      { label: "ارجع غدوة",     color: "#5d3a8e" }, // 3
      { label: "Portion Frite", color: "#7b1fa2" }, // 4
      { label: "Gezouza",       color: "#c62828" }, // 5
      { label: "Debouza Me",    color: "#43a047" }, // 6
      { label: "هز بلاش",       color: "#455a64" }, // 7
      { label: "Portion Blech", color: "#f9a825" }, // 8
    ];

   let currentRotation = 0;
let isSpinning = false;


// Random 100%
function getRandomSegment(){

  // يختار رقم من 0 حتى 8
  return Math.floor(Math.random() * segments.length);

}

    const CONFETTI_COLORS = ['#ff7b00','#e53935','#1e88e5','#ffcc33','#43a047','#7b1fa2','#fff'];

    let currentRotation = 0;
    let spinIndex = 0;
    let isSpinning = false;

    // رسم العجلة
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const radius = cx;
    const arc = (2 * Math.PI) / segments.length;

    function drawWheel() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < segments.length; i++) {
        const start = i * arc - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, start, start + arc);
        ctx.closePath();
        ctx.fillStyle = segments[i].color;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.25)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + arc / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 19px Cairo, sans-serif';
        ctx.shadowColor = 'rgba(0,0,0,0.7)';
        ctx.shadowBlur = 5;
        ctx.fillText(segments[i].label, radius - 18, 6);
        ctx.restore();
      }
    }

    drawWheel();

    // confetti
    function triggerConfetti(segIndex) {
      const count = (segIndex === 0 || segIndex === 1) ? 90 : 50;
      const container = document.getElementById('confetti-container');
      container.innerHTML = '';
      for (let k = 0; k < count; k++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        const size = 6 + Math.random() * 9;
        el.style.cssText = `
          left:${Math.random()*100}%;
          width:${size}px;
          height:${size*0.5}px;
          background:${CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)]};
          animation-duration:${1.8+Math.random()*1.5}s;
          animation-delay:${Math.random()*0.7}s;
          transform:rotate(${Math.random()*360}deg);
        `;
        container.appendChild(el);
      }
      setTimeout(() => container.innerHTML = '', 3800);
    }

    // spin
    function spin() {
      if (isSpinning) return;
      isSpinning = true;
      document.getElementById('spinBtn').disabled = true;
      document.getElementById('result').textContent = '';
      document.getElementById('result').className = '';

   const winIndex = getRandomSegment();
      
      const turns       = 5 + Math.floor(Math.random() * 3);
      const anglePerSeg = 360 / segments.length;
      const desired     = 360 - (winIndex * anglePerSeg + anglePerSeg / 2);
      const currentMod  = ((currentRotation % 360) + 360) % 360;
      let delta = desired - currentMod;
      if (delta < 0) delta += 360;
      currentRotation += turns * 360 + delta;

      canvas.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        isSpinning = false;
        document.getElementById('spinBtn').disabled = false;
        const label = segments[winIndex].label;
        const resultEl = document.getElementById('result');
        resultEl.textContent = '🎉 ' + label;
        resultEl.className = 'result-show';
        triggerConfetti(winIndex);
      }, 6100);
    }
  </script>

  <script>
    const music = document.getElementById("bgMusic");
music.volume = 0.5;

function applySavedTime(){
    try{
        const savedTime = localStorage.getItem("musicTime");
        if (savedTime && music.readyState > 0) {
            music.currentTime = parseFloat(savedTime);
        }
    } catch(e){}
}

if (music.readyState > 0) {
    applySavedTime();
} else {
    music.addEventListener("loadedmetadata", applySavedTime);
}

setInterval(() => {
    try { localStorage.setItem("musicTime", music.currentTime); } catch(e){}
}, 1000);

try {
    const muted = localStorage.getItem("musicMuted");
    if (muted === "true") { music.muted = true; }
} catch(e){}

function startMusic() {
    music.play().catch(() => {});
}

window.addEventListener("load", startMusic);
startMusic();

function unlockOnce() {
    startMusic();
    document.removeEventListener("click", unlockOnce);
    document.removeEventListener("touchstart", unlockOnce);
    document.removeEventListener("scroll", unlockOnce);
    document.removeEventListener("keydown", unlockOnce);
}

document.addEventListener("click", unlockOnce);
document.addEventListener("touchstart", unlockOnce);
document.addEventListener("scroll", unlockOnce);
document.addEventListener("keydown", unlockOnce);
  </script>
</body>
</html>
