<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ VIP - الفنان</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Cairo", sans-serif;
            background: linear-gradient(160deg, #1a0a00 0%, #2d1200 60%, #1a0a00 100%);
            color: white;
            text-align: center;
            padding: 30px 20px;
            min-height: 100vh;
        }
        h1 { color: #f5c842; font-size: 28px; font-weight: 900; margin-bottom: 6px; }
        .subtitle { color: #c8a96e; font-size: 14px; margin-bottom: 20px; }
        
        /* شاشة إدخال الاسم الفريدة */
        #nameSetup {
            background: rgba(0,0,0,0.5); padding: 30px; border-radius: 15px;
            max-width: 400px; margin: 40px auto; border: 1px solid #f5c842;
            box-shadow: 0 0 15px rgba(245, 200, 66, 0.2);
        }
        #nameSetup h3 { margin-bottom: 15px; font-size: 18px; color: #fff; }
        #clientNameInput { 
            font-family: "Cairo", sans-serif; padding: 12px; margin: 10px 0; 
            border-radius: 8px; border: 1px solid #c8a96e; width: 100%; 
            font-size: 16px; background: #2d1200; color: white; text-align: center; 
        }
        #startBtn { 
            background: linear-gradient(135deg, #f5c842, #d89b00); color: #1a0a00; 
            font-weight: bold; cursor: pointer; font-family: "Cairo", sans-serif; 
            padding: 12px; border-radius: 8px; border: none; width: 100%; font-size: 16px;
        }

        /* واجهة اللعبة المخفية في الأول */
        #mainGame { display: none; }
        .wheel-container { position: relative; width: 300px; height: 300px; margin: 0 auto 10px; }
        .pointer {
            position: absolute; top: -18px; left: 50%;
            transform: translateX(-50%); font-size: 36px; z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        #wheel {
            width: 100%; height: 100%; border-radius: 50%;
            border: 6px solid #f5c842;
            box-shadow: 0 0 25px rgba(245, 200, 66, 0.35);
            display: block;
        }
        #spinBtn {
            background: linear-gradient(135deg, #f5c842, #d89b00);
            color: #1a0a00; border: none; padding: 16px 40px;
            border-radius: 30px; font-size: 20px; font-weight: 700;
            font-family: "Cairo", sans-serif; cursor: pointer; margin-top: 24px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #spinBtn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 22px rgba(0,0,0,0.35); }
        #spinBtn:disabled { opacity: 0.4; cursor: not-allowed; background: #5a5a5a; color: #fff; }
        
        #statusAlert { color: #ffeb3b; font-weight: bold; margin-bottom: 15px; font-size: 16px; min-height: 24px; }
        #result { margin-top: 22px; font-size: 22px; color: #f5c842; font-weight: 700; min-height: 34px; }
        .back-btn {
            display: inline-block; margin-top: 28px; text-decoration: none;
            background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2);
            color: white; padding: 12px 28px; border-radius: 25px;
            font-family: "Cairo", sans-serif; font-size: 16px; transition: background 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.18); }
    </style>
</head>
<body>

    <h1>🎡 عجلة الحظ الفاخرة</h1>
    <p class="subtitle">مطعم الفنان يرحب بكم</p>

    <div id="nameSetup">
        <h3>مرحباً بك، الرجاء إدخال اسمك للبدء:</h3>
        <input type="text" id="clientNameInput" placeholder="اكتب اسمك هنا...">
        <button id="startBtn">تأكيد ودخول</button>
    </div>

    <div id="mainGame">
        <div id="statusAlert">⏳ في انتظار تفعيل عجلة VIP من الشيف...</div>
        <div class="wheel-container">
            <div class="pointer">▼</div>
            <canvas id="wheel" width="300" height="300"></canvas>
        </div>

        <button id="spinBtn" disabled>🎰 دور العجلة الـ VIP</button>
        <div id="result"></div>
        <a href="index.html" class="back-btn">🏠 العودة للرئيسية</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyClwbk9bCyY5YZO5jBMbjo4IWCqGfYcDCw",
            authDomain: "base-resto-3d1e8.firebaseapp.com",
            projectId: "base-resto-3d1e8",
            storageBucket: "base-resto-3d1e8.firebasestorage.app",
            messagingSenderId: "797391462536",
            appId: "1:797391462536:web:631a9149d7e2b33d137f3d",
            measurementId: "G-3H35HSFQ7S"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let clientName = "";

        // عند النقر على تأكيد الاسم
        document.getElementById("startBtn").addEventListener("click", async () => {
            const input = document.getElementById("clientNameInput").value.trim();
            if(!input) { alert("الرجاء كتابة اسمك!"); return; }
            clientName = input;

            // إظهار العجلة وإخفاء شاشة الاسم
            document.getElementById("nameSetup").style.display = "none";
            document.getElementById("mainGame").style.display = "block";

            const docId = "client_" + encodeURIComponent(clientName);

            // 1. إرسال اسم الحريف للفايربيز في وضع الانتظار (normal)
            await setDoc(doc(db, "active_sessions", docId), {
                name: clientName,
                status: "normal",
                time: new Date().toLocaleTimeString("fr-FR", { hour: '2-digit', minute: '2-digit' })
            });

            // 2. الاستماع اللحظي (onSnapshot): أول ما الكسير يضغط تفعيل، يتفتح الزرار فوراً!
            onSnapshot(doc(db, "active_sessions", docId), (snapshot) => {
                if(snapshot.exists()) {
                    const data = snapshot.data();
                    if(data.status === "VIP") {
                        document.getElementById("statusAlert").innerHTML = "👑 مبروك يا " + clientName + "! تم تفعيل عجلة VIP الذهبية لك!";
                        document.getElementById("statusAlert").style.color = "#4caf50";
                        document.getElementById("spinBtn").disabled = false; // افتح زر التدوير
                        window.isVIPReady = true;
                        window.switchToVIPWheels(); // تغيير الجوائز لـ VIP
                    }
                }
            });
        });

        // إرسال النتيجة الفائزة للـ شيف
        window.savePrizeToFirebase = async function(prizeText) {
            try {
                console.log("⏳ جاري إرسال جائزة الـ VIP...", prizeText);
                await addDoc(collection(db, "prizes"), {
                    prize: "🏆 VIP: " + prizeText,
                    date: "👤 الحريف: " + clientName + " - " + new Date().toLocaleString("fr-FR")
                });
                console.log("✅ تم حفظ النتيجة بنجاح!");
            } catch (error) {
                console.error("❌ خطأ فايربيز:", error);
            }
        }
    </script>

    <script>
        // جوائز الـ VIP الفاخرة (من غير ارجع غدوة)
        let prizes = [
            { text: "تخفيض 25%",     color: "#d4af37", weight: 4 }, 
            { text: "إضافة فريت عائلية", color: "#aa7c11", weight: 4 },
            { text: "مقلوب مجاني",    color: "#8a640f", weight: 4 },
            { text: "قازوزة لتر ونصف", color: "#d4af37", weight: 4 },
            { text: "بيتزا مجانية",    color: "#aa7c11", weight: 4 },
            { text: "تخفيض 50%",     color: "#e65100", weight: 1 }  
        ];

        const icons = {
            "تخفيض 25%":"🎁","إضافة فريت عائلية":"🍟","مقلوب مجاني":"🌯",
            "قازوزة لتر ونصف":"🥤","بيتزا مجانية":"🍕","تخفيض 50%":"🎉"
        };

        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const resultDiv = document.getElementById("result");
        
        let total, currentDeg = 0, spinning = false;

        window.switchToVIPWheels = function() {
            total = prizes.reduce((s,p) => s + p.weight, 0);
            let cum = 0;
            prizes.forEach(p => {
                p.startDeg = (cum / total) * 360;
                cum += p.weight;
                p.endDeg = (cum / total) * 360;
                p.midDeg = (p.startDeg + p.endDeg) / 2;
            });
            drawWheel(0);
        }

        function drawWheel(rotDeg = 0) {
            ctx.clearRect(0, 0, 300, 300);
            const cx = 150, cy = 150, r = 148;
            const rotRad = (rotDeg * Math.PI) / 180;
            if(!total) return;

            prizes.forEach(p => {
                const startRad = rotRad + (p.startDeg * Math.PI) / 180;
                const endRad   = rotRad + (p.endDeg   * Math.PI) / 180;

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, startRad, endRad);
                ctx.closePath();
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.4)";
                ctx.lineWidth = 2;
                ctx.stroke();

                const midRad = rotRad + (p.midDeg * Math.PI) / 180;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(midRad);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 13px Cairo";
                ctx.shadowColor = "rgba(0,0,0,0.8)";
                ctx.shadowBlur = 4;
                ctx.fillText((icons[p.text]||"") + " " + p.text, r - 10, 5);
                ctx.restore();
            });

            ctx.beginPath();
            ctx.arc(cx, cy, 18, 0, 2 * Math.PI);
            ctx.fillStyle = "#1a0a00";
            ctx.fill();
            ctx.strokeStyle = "#f5c842";
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // تحضير العجلة المبدئية
        window.switchToVIPWheels();

        spinBtn.addEventListener("click", () => {
            if (spinning || !window.isVIPReady) return;
            spinning = true;
            spinBtn.disabled = true;
            resultDiv.innerHTML = "";

            const rand = Math.random() * total;
            let acc = 0;
            let winner = prizes[prizes.length - 1];
            for (let p of prizes) {
                acc += p.weight;
                if (rand <= acc) { winner = p; break; }
            }

            const targetRot = (270 - winner.midDeg + 360) % 360;
            const extraSpins = 360 * 10;
            const endDeg = currentDeg - (currentDeg % 360) + extraSpins + targetRot;

            const startDeg = currentDeg;
            const duration = 5000;
            const startTime = performance.now();

            function animate(now) {
                const t = Math.min((now - startTime) / duration, 1);
                const deg = startDeg + (endDeg - startDeg) * (1 - Math.pow(1 - t, 4));
                drawWheel(deg);
                if (t < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentDeg = endDeg;
                    spinning = false;
                    
                    const emojiResult = (icons[winner.text] || "");
                    resultDiv.innerHTML = "🎁 مبروك الجائزة الـ VIP: " + emojiResult + " " + winner.text;
                    
                    if (typeof window.savePrizeToFirebase === "function") {
                        window.savePrizeToFirebase(winner.text);
                    }
                }
            }

            requestAnimationFrame(animate);
        });
    </script>
</body>
</html>
