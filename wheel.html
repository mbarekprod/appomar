<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎡 عجلة الحظ - مطعم الفنان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: #1a0a00;
            color: #ffca28;
            font-family: 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #4a0000, #1a0a00);
        }

        h1 { margin-bottom: 10px; color: #ffca28; text-shadow: 2px 2px 4px #000; }
        
        /* تصميم العجلة */
        #wheel {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 10px solid #ffca28;
            background: conic-gradient(#b71c1c 0% 25%, #ff6f00 25% 50%, #b71c1c 50% 75%, #ff6f00 75% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            position: relative;
        }

        #wheel::after {
            content: "🎨"; /* مكان الشعار */
            font-size: 60px;
        }

        button {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: #ffca28;
            color: #4a0000;
            transition: 0.3s;
        }

        button:active { transform: scale(0.95); }

        #result {
            margin-top: 25px;
            font-size: 28px;
            font-weight: 900;
            height: 50px;
        }
    </style>
</head>
<body>

    <h1>مطعم الفنان 🎡</h1>
    <div id="wheel" id="wheel"></div>
    <button id="spinBtn" onclick="startSpin()">دَوّر واربح!</button>
    <div id="result">استنى حظك...</div>

    <script>
        let spinCount = 0;
        let rotation = 0;

        function startSpin() {
            const wheel = document.getElementById("wheel");
            const result = document.getElementById("result");
            const btn = document.getElementById("spinBtn");

            btn.disabled = true;
            spinCount++;

            // حركة الدوران
            rotation += 1440 + Math.random() * 360; 
            wheel.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                let text = "";
                
                if (spinCount < 11) {
                    const msgs = ["🔄 عاود دور", "🚫 ارجع غدوة"];
                    text = msgs[Math.floor(Math.random() * msgs.length)];
                } else {
                    const prizes = ["🎁 Remise 50%", "🎁 Remise 25%", "🥤 Gezouza بلاش", "🍟 Portion Frit"];
                    text = "🎉 مبروك ربحت: " + prizes[Math.floor(Math.random() * prizes.length)];
                    spinCount = 0; // إعادة العداد للصفر بعد الربح
                }

                result.innerText = text;
                btn.disabled = false;
            }, 4000);
        }
    </script>
</body>
</html>
