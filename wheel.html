<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        /* ستايل العجلة */
        .wheel-container {
            position: relative;
            width: 300px; height: 300px;
            margin: 50px auto;
        }
        #wheel {
            width: 100%; height: 100%; border-radius: 50%;
            border: 8px solid #ffca28;
            position: relative; overflow: hidden;
            background: conic-gradient(
                #b71c1c 0deg 30deg, #ff6f00 30deg 60deg, 
                #b71c1c 60deg 90deg, #ff6f00 90deg 120deg,
                #b71c1c 120deg 150deg, #ff6f00 150deg 180deg,
                #b71c1c 180deg 210deg, #ff6f00 210deg 240deg,
                #b71c1c 240deg 270deg, #ff6f00 270deg 300deg,
                #b71c1c 300deg 330deg, #ff6f00 330deg 360deg
            );
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        /* تنسيق النصوص: هذا هو السر باش تطلع منظمة */
        .segment-text {
            position: absolute;
            top: 50%; left: 50%;
            width: 50%; height: 20px;
            transform-origin: 0 0;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-align: center;
        }

        /* توزيع كل نص في شريحته الخاصة */
        .s1 { transform: rotate(15deg); }
        .s2 { transform: rotate(45deg); }
        .s3 { transform: rotate(75deg); }
        .s4 { transform: rotate(105deg); }
        .s5 { transform: rotate(135deg); }
        .s6 { transform: rotate(165deg); }
        .s7 { transform: rotate(195deg); }
        .s8 { transform: rotate(225deg); }
        .s9 { transform: rotate(255deg); }
        .s10 { transform: rotate(285deg); }
        .s11 { transform: rotate(315deg); }
        .s12 { transform: rotate(345deg); }
    </style>
</head>
<body>
    <div class="wheel-container">
        <div id="wheel">
            <div class="segment-text s1">قازوزة</div>
            <div class="segment-text s2">فريت</div>
            <div class="segment-text s3">تخفيض 50%</div>
            </div>
    </div>
</body>
</html>
