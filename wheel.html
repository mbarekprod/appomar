<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Casino Royale Wheel</title>
    <style>
        /* خلفية كازينو فخمة ومتحركة */
        body { 
            margin: 0; padding: 0; 
            background: linear-gradient(45deg, #1a0000, #4a0000, #000);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: #fff; text-align: center; font-family: 'Cairo', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        .wheel-container { position: relative; margin-bottom: 30px; }
        .pointer { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); font-size: 50px; color: #ffca28; z-index: 10; filter: drop-shadow(0 0 5px #000); }
        
        #wheel { border: 12px solid #333; border-radius: 50%; box-shadow: 0 0 40px rgba(255,202,40,0.4); transition: transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99); cursor: pointer; }
        
        #spinBtn { background: linear-gradient(to bottom, #d32f2f, #b71c1c); border: 2px solid #ffca28; color: #fff; padding: 15px 50px; font-size: 22px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.3s; }
        #spinBtn:hover { transform: scale(1.05); background: #ff5252; }
        
        #result-text { margin-top: 25px; font-size: 32px; color: #ffca28; font-weight: bold; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <h1>🎰 CASINO ROYAL WHEEL 🎰</h1>
    <div class="wheel-container">
        <div class="pointer">▼</div>
        <canvas id="wheel" width="350" height="350"></canvas>
    </div>
    <button id="spinBtn">SPIN TO WIN!</button>
    <div id="result-text">اضغط لتبدأ الحظ!</div>

    <script>
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const resultDiv = document.getElementById("result-text");
        
        const prizes = [
            { text: "تخفيض 25%", color: "#c8930a" }, { text: "ارجع غدوة", color: "#5a5a5a" },
            { text: "إضافة فريت", color: "#c97400" }, { text: "دور مرة أخرى", color: "#2e7d32" },
            { text: "ارجع غدوة", color: "#484848" }, { text: "إضافة فريت", color: "#e65100" },
            { text: "قازوزة مجانية", color: "#880e4f" }, { text: "ارجع غدوة", color: "#404040" },
            { text: "إضافة فريت", color: "#bf360c" }, { text: "دابوزة ماء", color: "#0d47a1" },
            { text: "ارجع غدوة", color: "#383838" }, { text: "تخفيض 50%", color: "#6a1b9a" }
        ];

        function drawWheel() {
            const cx = 175, cy = 175, r = 160;
            const sliceAngle = (2 * Math.PI) / prizes.length;
            prizes.forEach((p, i) => {
                const startAngle = i * sliceAngle;
                ctx.beginPath(); ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, startAngle, startAngle + sliceAngle);
                ctx.fillStyle = p.color; ctx.fill(); ctx.stroke();
                
                ctx.save(); ctx.translate(cx, cy); 
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = "right"; ctx.fillStyle = "#fff"; 
                ctx.font = "bold 13px Arial";
                ctx.fillText(p.text, r - 30, 5); 
                ctx.restore();
            });
        }
        drawWheel();

        let rotation = 0;
        document.getElementById("spinBtn").onclick = () => {
            resultDiv.innerText = "⏳ جاري التدوير...";
            const randomAngle = Math.floor(Math.random() * 3600) + 1800;
            rotation += randomAngle;
            canvas.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => {
                const finalDegree = rotation % 360;
                const index = Math.floor((360 - finalDegree) / (360 / prizes.length)) % prizes.length;
                resultDiv.innerText = "🎉 مبروك! ربحت: " + prizes[index].text;
            }, 5000);
        };
    </script>
</body>
</html>
