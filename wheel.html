<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عجلة مطعم الفنان</title>
    <style>
        body { background: #1a0a00; color: #ffca28; font-family: 'Cairo', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .wheel-wrapper { position: relative; width: 350px; height: 350px; }
        
        #wheel {
            width: 100%; height: 100%; border-radius: 50%;
            border: 10px solid #ffca28;
            position: relative; overflow: hidden;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            /* 9 خانات: 360 / 9 = 40 درجة للخانة */
            background: conic-gradient(
                #b71c1c 0deg 40deg, #ff6f00 40deg 80deg, #b71c1c 80deg 120deg, 
                #ff6f00 120deg 160deg, #b71c1c 160deg 200deg, #ff6f00 200deg 240deg,
                #b71c1c 240deg 280deg, #ff6f00 280deg 320deg, #b71c1c 320deg 360deg
            );
        }

        /* اللوجو في الوسط */
        .logo-center {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px; background: #fff;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 30px; z-index: 5;
        }

        .segment {
            position: absolute; width: 50%; height: 50%;
            transform-origin: 100% 100%;
            left: 0; top: 0; display: flex; align-items: flex-start;
            justify-content: center; padding-top: 15px;
            font-size: 14px; font-weight: bold; color: white;
            transform: rotate(20deg) skewY(-50deg); /* تضبيط زاوية النصوص */
        }

        button { padding: 15px 40px; font-size: 20px; border-radius: 30px; border: none; background: #ffca28; cursor: pointer; margin-top: 30px; }
        #result { margin-top: 20px; font-size: 26px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🎡 عجلة مطعم الفنان</h1>
    <div class="wheel-wrapper">
        <div id="wheel">
            <div class="logo-center">🎨</div>
            <div class="segment" style="transform: rotate(0deg) skewY(-50deg);">50%</div>
            <div class="segment" style="transform: rotate(40deg) skewY(-50deg);">25%</div>
            <div class="segment" style="transform: rotate(80deg) skewY(-50deg);">فريت</div>
            <div class="segment" style="transform: rotate(120deg) skewY(-50deg);">قازوزة</div>
            <div class="segment" style="transform: rotate(160deg) skewY(-50deg);">عاود دور</div>
            <div class="segment" style="transform: rotate(200deg) skewY(-50deg);">ارجع غدوة</div>
            <div class="segment" style="transform: rotate(240deg) skewY(-50deg);">فريت</div>
            <div class="segment" style="transform: rotate(280deg) skewY(-50deg);">قازوزة</div>
            <div class="segment" style="transform: rotate(320deg) skewY(-50deg);">عاود دور</div>
        </div>
    </div>

    <button onclick="spin()">دَوّر!</button>
    <div id="result"></div>

    <script>
        let rotation = 0;
        let count = 0;
        function spin() {
            count++;
            const wheel = document.getElementById("wheel");
            rotation += 1800 + Math.random() * 360;
            wheel.style.transform = `rotate(${rotation}deg)`;
            
            setTimeout(() => {
                if (count < 11) {
                    document.getElementById("result").innerText = "حظ أوفر المرة القادمة!";
                } else {
                    document.getElementById("result").innerText = "مبروك ربحت جائزة!";
                    count = 0;
                }
            }, 4000);
        }
    </script>
</body>
</html>
