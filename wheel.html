<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎡 عجلة الحظ - الفنان</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
background:
linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.78)),
url('https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=1400&auto=format&fit=crop');
background-size:cover;
background-position:center;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
color:white;
padding:20px;
}

.logo{
font-size:58px;
font-weight:900;
color:#ffcc33;
text-shadow:
0 0 10px rgba(255,204,51,.8),
0 0 25px rgba(255,136,0,.7);
margin-bottom:10px;
}

.sub{
font-size:22px;
margin-bottom:25px;
color:#fff2b8;
}

.wheel-wrapper{
position:relative;
width:430px;
height:430px;
display:flex;
justify-content:center;
align-items:center;
}

.pointer{
position:absolute;
top:-20px;
font-size:65px;
z-index:99;
color:#ff1e1e;
filter:drop-shadow(0 0 8px black);
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:12px solid #ffcc33;
background:#111;
box-shadow:
0 0 20px rgba(255,204,51,.8),
0 0 50px rgba(255,136,0,.5);
transition:transform 6s cubic-bezier(.17,.67,.12,.99);
}

.center-circle{
position:absolute;
width:130px;
height:130px;
border-radius:50%;
background:
radial-gradient(circle,#ffcc33,#ff7b00);
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:900;
border:8px solid white;
z-index:50;
box-shadow:0 0 20px rgba(255,255,255,.4);
}

.spin-btn{
margin-top:35px;
padding:18px 65px;
border:none;
border-radius:50px;
font-size:28px;
font-weight:900;
cursor:pointer;
background:
linear-gradient(45deg,#ff1e1e,#ff7b00);
color:white;
box-shadow:
0 0 20px rgba(255,87,34,.7);
transition:.3s;
}

.spin-btn:hover{
transform:scale(1.08);
}

.spin-btn:disabled{
opacity:.5;
cursor:not-allowed;
}

#result{
margin-top:30px;
font-size:35px;
font-weight:900;
min-height:60px;
color:#ffcc33;
text-shadow:0 0 10px rgba(255,204,51,.8);
animation:fade .4s ease;
text-align:center;
}

.counter{
margin-top:10px;
font-size:25px;
font-weight:bold;
color:#fff;
}

.info{
margin-top:20px;
background:rgba(0,0,0,.45);
padding:18px 30px;
border-radius:20px;
font-size:20px;
line-height:1.8;
border:1px solid rgba(255,255,255,.1);
text-align:center;
}

.glow{
animation:glow 1s infinite alternate;
}

@keyframes glow{

from{
filter:drop-shadow(0 0 5px #fff);
}

to{
filter:drop-shadow(0 0 20px #ffcc33);
}

}

@keyframes fade{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@media(max-width:500px){

.wheel-wrapper{
width:320px;
height:320px;
}

.logo{
font-size:42px;
}

.spin-btn{
font-size:22px;
padding:15px 40px;
}

#result{
font-size:26px;
}

.info{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="logo">
🍔 EL FANEN
</div>

<div class="sub">
🎡 عجلة الحظ الخاصة بمطعم الفنان
</div>

<div class="wheel-wrapper">

<div class="pointer glow">
▼
</div>

<canvas id="wheel" width="430" height="430"></canvas>

<div class="center-circle">
🎡
</div>

</div>

<button class="spin-btn" id="spinBtn">
🔥 دوّر العجلة
</button>

<div id="result">
🔥 جرّب حظك
</div>

<div class="counter">
الدورة الحالية:
<span id="roundNumber">1</span>/11
</div>

<div class="info">

كل زبون يدور مرة فقط 🎯<br>

أول 10 دورات:<br>
🔁 عاود داور أو 🚫 ارجع غدوة<br>

الدورة 11 : ربح مضمون 🎁

</div>

<script>

const canvas = document.getElementById("wheel");

const ctx = canvas.getContext("2d");

const spinBtn = document.getElementById("spinBtn");

const result = document.getElementById("result");

const roundNumber =
document.getElementById("roundNumber");

const wheelData = [

{
text:"🔁",
label:"عاود داور",
color:"#1e88e5"
},

{
text:"🚫",
label:"ارجع غدوة",
color:"#757575"
},

{
text:"🍟",
label:"Portion Frit",
color:"#8e24aa"
},

{
text:"🥤",
label:"Gezouza",
color:"#fbc02d"
},

{
text:"💧",
label:"Debouza Mé",
color:"#2ecc71"
},

{
text:"25%",
label:"Remise",
color:"#ff6f00"
},

{
text:"50%",
label:"Remise",
color:"#d50000"
}

];

const totalSlices = wheelData.length;

const sliceAngle =
(2 * Math.PI) / totalSlices;

function drawWheel(){

for(let i = 0; i < totalSlices; i++){

const start = i * sliceAngle;

const end = start + sliceAngle;

ctx.beginPath();

ctx.moveTo(215,215);

ctx.arc(
215,
215,
215,
start,
end
);

ctx.fillStyle = wheelData[i].color;

ctx.fill();

ctx.strokeStyle = "#ffffff";

ctx.lineWidth = 3;

ctx.stroke();

ctx.save();

ctx.translate(215,215);

ctx.rotate(start + sliceAngle / 2);

ctx.fillStyle = "#fff";

ctx.textAlign = "center";

/* ICON */

ctx.font = "bold 34px Cairo";

ctx.fillText(
wheelData[i].text,
150,
-5
);

/* LABEL */

ctx.font = "bold 18px Cairo";

ctx.fillText(
wheelData[i].label,
150,
30
);

ctx.restore();

}

}

drawWheel();

let rotation = 0;

let spinning = false;

let spinCount = 0;

function getResult(){

spinCount++;

if(spinCount <= 10){

const normalResults = [

"🔁 عاود داور",

"🚫 ارجع غدوة"

];

return normalResults[
Math.floor(
Math.random() *
normalResults.length
)
];

}

else{

const bigWins = [

"🍟 Portion Frit",

"🥤 Gezouza"

];

spinCount = 0;

return bigWins[
Math.floor(
Math.random() *
bigWins.length
)
];

}

}

spinBtn.addEventListener("click",()=>{

if(spinning) return;

spinning = true;

spinBtn.disabled = true;

result.innerHTML =
"🎡 العجلة تدور...";

const finalPrize = getResult();

let targetIndex = 0;

if(finalPrize.includes("عاود")){

targetIndex = 0;

}

else if(finalPrize.includes("غدوة")){

targetIndex = 1;

}

else if(finalPrize.includes("Portion")){

targetIndex = 2;

}

else if(finalPrize.includes("Gezouza")){

targetIndex = 3;

}

const extraSpins = 360 * 6;

const degreePerSlice =
360 / totalSlices;

const stopDegree =
360 -
(targetIndex * degreePerSlice) -
(degreePerSlice / 2);

rotation +=
extraSpins +
stopDegree;

canvas.style.transform =
`rotate(${rotation}deg)`;

setTimeout(()=>{

result.innerHTML =
`🎉 النتيجة: ${finalPrize}`;

spinning = false;

spinBtn.disabled = false;

roundNumber.innerHTML =
spinCount === 0
? 1
: spinCount + 1;

},6000);

});

</script>

</body>
</html>
