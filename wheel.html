<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎡 عجلة مطعم الفنان</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#1a0a00,#4a0000);
color:#ffca28;
text-align:center;
font-family:'Cairo',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
margin:0;
}

h1{
margin-bottom:20px;
}

#wheel{
width:250px;
height:250px;
border-radius:50%;
background: radial-gradient(circle,#ffca28,#ff6f00);
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
box-shadow:0 0 25px rgba(255,193,7,0.7);
transition: transform 4s cubic-bezier(0.17,0.67,0.12,0.99);
}

button{
margin-top:25px;
padding:15px 40px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
background:#b71c1c;
color:white;
}

#result{
margin-top:20px;
font-size:24px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🎡 عجلة الحظ</h1>

<div id="wheel">🎡</div>

<button onclick="startSpin()">دَوّر!</button>

<div id="result">استنى الحظ...</div>

<script>

let spinCount = 0;
let rotation = 0;

function startSpin(){

spinCount++;

const wheel = document.getElementById("wheel");
const result = document.getElementById("result");

// 🎡 animation
rotation += 720 + Math.random()*360;
wheel.style.transform = `rotate(${rotation}deg)`;

setTimeout(()=>{

let text = "";

// 🔁 1 → 10
if(spinCount <= 10){

const msgs = ["🔄 عاود داور","🚫 ارجع غدوة"];
text = msgs[Math.floor(Math.random()*msgs.length)];
}

// 🏆 11 = WIN
else if(spinCount === 11){

const prizes = ["🍟 Portion Frit","🍊 Gezouza"];
text = "🎉 مبروك: " + prizes[Math.floor(Math.random()*prizes.length)];

spinCount = 0;
}

result.innerText = text;

},4000);

}

</script>

</body>
</html>
