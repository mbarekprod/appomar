<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎡 عجلة الحظ - الفنان</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Cairo',sans-serif;

background:
linear-gradient(rgba(0,0,0,.80),rgba(0,0,0,.80)),
url('https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=1400&auto=format&fit=crop');

background-size:cover;
background-position:center;
background-repeat:no-repeat;

height:100vh;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

overflow:hidden;

color:white;

}

/* LOGO */

.logo{

font-size:42px;
font-weight:900;

color:#ffcc33;

text-shadow:
0 0 10px rgba(255,204,51,.8),
0 0 25px rgba(255,136,0,.7);

margin-bottom:5px;

}

/* SUBTITLE */

.sub{

font-size:18px;
margin-bottom:12px;
color:#fff2b8;

}

/* WHEEL */

.wheel-wrapper{

position:relative;

width:330px;
height:330px;

display:flex;
justify-content:center;
align-items:center;

}

/* POINTER */

.pointer{

position:absolute;
top:-20px;

font-size:55px;

z-index:99;

color:#ff1e1e;

filter:drop-shadow(0 0 8px black);

animation:glow 1s infinite alternate;

}

/* CANVAS */

#wheel{

width:100%;
height:100%;

border-radius:50%;

border:10px solid #ffcc33;

background:#111;

box-shadow:
0 0 20px rgba(255,204,51,.8),
0 0 50px rgba(255,136,0,.5);

transition:transform 6s cubic-bezier(.17,.67,.12,.99);

}

/* CENTER */

.center-circle{

position:absolute;

width:95px;
height:95px;

border-radius:50%;

background:
radial-gradient(circle,#ffcc33,#ff7b00);

display:flex;
justify-content:center;
align-items:center;

font-size:32px;
font-weight:900;

border:6px solid white;

z-index:50;

box-shadow:0 0 20px rgba(255,255,255,.4);

}

/* BUTTON */

.spin-btn{

margin-top:15px;

padding:15px 45px;

border:none;

border-radius:50px;

font-size:22px;
font-weight:900;

cursor:pointer;

background:
linear-gradient(45deg,#ff1e1e,#ff7b00);

color:white;

box-shadow:
0 0 20px rgba(255,87,34,.7);

transition:.3s;

}

.spin-btn:hover{

transform:scale(1.08);

}

.spin-btn:disabled{

opacity:.5;
cursor:not-allowed;

}

/* RESULT */

#result{

margin-top:18px;

font-size:25px;
font-weight:900;

min-height:40px;

color:#ffcc33;

text-shadow:0 0 10px rgba(255,204,51,.8);

text-align:center;

}

/* COUNTER */

.counter{

margin-top:5px;

font-size:18px;
font-weight:bold;

color:#fff;

}

/* INFO */

.info{

margin-top:12px;

background:rgba(0,0,0,.45);

padding:12px 20px;

border-radius:20px;

font-size:16px;

line-height:1.5;

border:1px solid rgba(255,255,255,.1);

text-align:center;

max-width:320px;

}

/* ANIMATION */

@keyframes glow{

from{
filter:drop-shadow(0 0 5px #fff);
}

to{
filter:drop-shadow(0 0 20px #ffcc33);
}

}

/* MOBILE */

@media(max-width:500px){

.logo{
font-size:34px;
}

.sub{
font-size:16px;
}

.wheel-wrapper{
width:280px;
height:280px;
}

.spin-btn{
font-size:20px;
padding:13px 32px;
}

.info{
font-size:14px;
}

}

</style>
</head>

<body>

<!-- LOGO -->

<div class="logo">
🍔 EL FANEN
</div>

<!-- SUB -->

<div class="sub">
🎡 عجلة الحظ الخاصة بمطعم الفنان
</div>

<!-- WHEEL -->

<div class="wheel-wrapper">

<div class="pointer">
▼
</div>

<canvas id="wheel" width="330" height="330"></canvas>

<div class="center-circle">
🎡
</div>

</div>

<!-- BUTTON -->

<button class="spin-btn" id="spinBtn">
🔥 دوّر العجلة
</button>

<!-- RESULT -->

<div id="result">
🔥 جرّب حظك
</div>

<!-- COUNTER -->

<div class="counter">

الدورة الحالية:
<span id="roundNumber">1</span>/11

</div>

<!-- INFO -->

<div class="info">

كل زبون يدور مرة فقط 🎯<br>

أول 10 دورات:
🔁 عاود داور أو 🚫 ارجع غدوة<br>

الدورة 11 : ربح مضمون 🎁

</div>

<script>

/* CANVAS */

const canvas =
document.getElementById("wheel");

const ctx =
canvas.getContext("2d");

/* ELEMENTS */

const spinBtn =
document.getElementById("spinBtn");

const result =
document.getElementById("result");

const roundNumber =
document.getElementById("roundNumber");

/* WHEEL DATA */

const wheelData = [

{
text:"🔁",
label:"عاود داور",
color:"#1e88e5"
},

{
text:"🚫",
label:"ارجع غدوة",
color:"#757575"
},

{
text:"🍟",
label:"Portion Frit",
color:"#8e24aa"
},

{
text:"🥤",
label:"Gezouza",
color:"#fbc02d"
},

{
text:"💧",
label:"Debouza Mé",
color:"#2ecc71"
},

{
text:"25%",
label:"Remise",
color:"#ff6f00"
},

{
text:"50%",
label:"Remise",
color:"#d50000"
}

];

/* DRAW WHEEL */

const totalSlices =
wheelData.length;

const sliceAngle =
(2 * Math.PI) / totalSlices;

function drawWheel(){

for(let i = 0; i < totalSlices; i++){

const start = i * sliceAngle;

const end = start + sliceAngle;

ctx.beginPath();

ctx.moveTo(165,165);

ctx.arc(
165,
165,
165,
start,
end
);

ctx.fillStyle =
wheelData[i].color;

ctx.fill();

ctx.strokeStyle =
"#ffffff";

ctx.lineWidth = 3;

ctx.stroke();

ctx.save();

ctx.translate(165,165);

ctx.rotate(start + sliceAngle / 2);

ctx.fillStyle = "#fff";

ctx.textAlign = "center";

/* ICON */

ctx.font = "bold 28px Cairo";

ctx.fillText(
wheelData[i].text,
115,
-5
);

/* LABEL */

ctx.font = "bold 16px Cairo";

ctx.fillText(
wheelData[i].label,
115,
22
);

ctx.restore();

}

}

drawWheel();

/* SPIN SYSTEM */

let rotation = 0;

let spinning = false;

let spinCount = 0;

/* RESULT SYSTEM */

function getResult(){

spinCount++;

if(spinCount <= 10){

const normalResults = [

"🔁 عاود داور",

"🚫 ارجع غدوة"

];

return normalResults[
Math.floor(
Math.random() *
normalResults.length
)
];

}

else{

const bigWins = [

"🍟 Portion Frit",

"🥤 Gezouza"

];

spinCount = 0;

return bigWins[
Math.floor(
Math.random() *
bigWins.length
)
];

}

}

/* SPIN BUTTON */

spinBtn.addEventListener("click",()=>{

if(spinning) return;

spinning = true;

spinBtn.disabled = true;

result.innerHTML =
"🎡 العجلة تدور...";

/* FINAL RESULT */

const finalPrize =
getResult();

/* TARGET */

let targetIndex = 0;

if(finalPrize.includes("عاود")){

targetIndex = 0;

}

else if(finalPrize.includes("غدوة")){

targetIndex = 1;

}

else if(finalPrize.includes("Portion")){

targetIndex = 2;

}

else if(finalPrize.includes("Gezouza")){

targetIndex = 3;

}

/* ROTATION */

const extraSpins =
360 * 6;

const degreePerSlice =
360 / totalSlices;

const stopDegree =
360 -
(targetIndex * degreePerSlice) -
(degreePerSlice / 2);

rotation +=
extraSpins +
stopDegree;

/* ANIMATION */

canvas.style.transform =
`rotate(${rotation}deg)`;

/* RESULT */

setTimeout(()=>{

result.innerHTML =
`🎉 النتيجة: ${finalPrize}`;

spinning = false;

spinBtn.disabled = false;

/* COUNTER */

roundNumber.innerHTML =
spinCount === 0
? 1
: spinCount + 1;

},6000);

});

</script>

</body>
</html>
```
