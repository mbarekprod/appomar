<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>مطعم الفنان | تواصل معنا</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
  <audio id="bgMusic" loop>
    <source src="sanfara.mp3" type="audio/mpeg">
</audio>

font-family:'Cairo',sans-serif;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

position:relative;

background:

linear-gradient(
rgba(0,0,0,0.82),
rgba(0,0,0,0.82)
),

url('unnamed (2).jpg');

background-size:cover;
background-position:center;

animation:slowZoom 20s infinite alternate;
}

@keyframes slowZoom{

from{
background-size:100%;
}

to{
background-size:120%;
}

}

.container{

width:90%;
max-width:420px;

padding:30px;

background:
rgba(20,20,20,0.72);

backdrop-filter:blur(18px);

border:
1px solid rgba(255,204,51,.25);

border-radius:35px;

text-align:center;

box-shadow:
0 0 45px rgba(0,0,0,.5);

animation:fadeIn 1s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{

width:135px;
height:135px;

border-radius:50%;

border:4px solid #ffcc33;

margin-bottom:20px;

box-shadow:
0 0 20px rgba(255,204,51,.4);

object-fit:cover;
}

h1{

color:white;

margin-bottom:25px;

font-size:34px;
}

.btn{

display:flex;

align-items:center;

justify-content:space-between;

background:
rgba(255,255,255,.05);

padding:20px;

margin:15px 0;

border-radius:22px;

text-decoration:none;

color:white;

transition:.3s;

border:
1px solid rgba(255,255,255,.1);
}

.btn:hover{

background:
rgba(255,204,51,.12);

border-color:#ffcc33;

transform:scale(1.02);
}

.val{

color:#ffcc33;

font-weight:900;

font-size:17px;
}

.icon{

font-size:28px;
}

.back{

color:#999;

font-size:14px;

text-decoration:none;

margin-top:20px;

display:block;

transition:.3s;
}

.back:hover{

color:white;
}

</style>

</head>

<body>

<div class="container">

<img
src="735043823_122232458936380788_691619389420209673_n (3).jpg"
class="logo">

<h1>

مطعم الفنان

</h1>

<a
href="tel:+21627091965"
class="btn">

<div>

اتصل بنا <br>

<span class="val">

</span>

</div>

<div class="icon">

📞

</div>

</a>

<a
href="https://www.facebook.com/profile.php?id=61561423656138"
target="_blank"
class="btn">

<div>

فيسبوك <br>

<span class="val">

مطعم الفنان

</span>

</div>

<div class="icon">

📘

</div>

</a>

<a
href="https://maps.app.goo.gl/tZCRQV84MwNQhEZg9"
target="_blank"
class="btn">

<div>

عنوان المطعم <br>

<span class="val">

افتح الموقع على Google Maps

</span>

</div>

<div class="icon">

📍

</div>

</a>

<a
href="index.html"
class="back">

← الرجوع للرئيسية

</a>

</div>

</body>

</html>
