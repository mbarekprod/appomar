<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا | مطعم الفنان</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        body {
            background: #050505;
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Neon Glow Effect */
        .container {
            width: 90%;
            max-width: 400px;
            padding: 30px;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(255, 204, 51, 0.2);
            text-align: center;
            animation: borderPulse 3s infinite;
        }

        @keyframes borderPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 204, 51, 0.2); }
            50% { box-shadow: 0 0 40px rgba(255, 204, 51, 0.5); }
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #ffcc33;
            animation: rotateLogo 10s linear infinite;
        }

        @keyframes rotateLogo {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, #1a1a1a, #000);
            padding: 20px;
            margin: 20px 0;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            border: 1px solid #444;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            border-color: #ffcc33;
            transform: scale(1.05);
            box-shadow: 0 0 15px #ffcc33;
        }

        .icon { font-size: 30px; }
        .val { color: #ffcc33; font-size: 18px; font-weight: 900; }

        .back {
            color: #555;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }
        .back:hover { color: #ffcc33; }
    </style>
</head>
<body>

    <div class="container">
        <img src="go.png" class="logo" alt="Logo">
        <h1 style="color: #ffcc33;">مطعم الفنان</h1>
        
        <a href="tel:+21627091965" class="btn">
            <div class="text">اتصل بنا<br><span class="val">27 091 965</span></div>
            <div class="icon">📞</div>
        </a>

        <a href="https://www.facebook.com/profile.php?id=61561423656138" target="_blank" class="btn">
            <div class="text">فيسبوك<br><span class="val">مطعم الفنان</span></div>
            <div class="icon">📘</div>
        </a>

        <a href="index.html" class="back">← الرجوع للرئيسية</a>
    </div>

</body>
</html>
