<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الفنان | تواصل معنا</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            /* التصويرة اللي تحب عليها في الخلفية */
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=2000');
            background-size: cover;
            background-position: center;
            animation: slowZoom 20s infinite alternate; /* حركة الزوم */
        }

        @keyframes slowZoom {
            from { background-size: 100%; }
            to { background-size: 120%; }
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 30px;
            background: rgba(20, 20, 20, 0.7); /* خلفية نصف شفافة */
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 204, 51, 0.3);
            border-radius: 35px;
            text-align: center;
            z-index: 1;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #ffcc33;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 204, 51, 0.4);
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            margin: 15px 0;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            background: rgba(255, 204, 51, 0.15);
            border-color: #ffcc33;
            transform: scale(1.02);
        }

        .val { color: #ffcc33; font-weight: 900; }
        .back { color: #888; font-size: 14px; text-decoration: none; margin-top: 20px; display: block; }
        .back:hover { color: white; }
    </style>
</head>
<body>

    <div class="container">
        <img src="go.png" class="logo" alt="Logo">
        <h1 style="color: white; margin-bottom: 20px;">مطعم الفنان</h1>
        
        <a href="tel:+21627091965" class="btn">
            <div>اتصل بنا<br><span class="val">27 091 965</span></div>
            <div style="font-size: 25px;">📞</div>
        </a>

        <a href="https://www.facebook.com/profile.php?id=61561423656138" target="_blank" class="btn">
            <div>فيسبوك<br><span class="val">مطعم الفنان</span></div>
            <div style="font-size: 25px;">📘</div>
        </a>

        <a href="index.html" class="back">← الرجوع للرئيسية</a>
    </div>

</body>
</html>
