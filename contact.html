<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الفنان | تواصل معنا</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background: #050505;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* الخلفية المتحركة (Animated Background) */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #ffcc33, transparent 70%);
            animation: moveGlow 10s infinite alternate;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
        }

        @keyframes moveGlow {
            0% { transform: translate(-200px, -200px); }
            100% { transform: translate(200px, 200px); }
        }

        /* الـ Container مع Zoom Effect */
        .container {
            width: 90%;
            max-width: 400px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            text-align: center;
            z-index: 1;
            animation: zoomIn 1s ease-out;
        }

        @keyframes zoomIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #ffcc33;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 204, 51, 0.3);
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            margin: 15px 0;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            transform: scale(1.05);
            background: rgba(255, 204, 51, 0.2);
            border-color: #ffcc33;
        }

        .val { color: #ffcc33; font-weight: 900; }
        
        .back { color: #888; font-size: 14px; text-decoration: none; margin-top: 20px; display: block; }
        .back:hover { color: white; }
    </style>
</head>
<body>

    <div class="container">
        <img src="go.png" class="logo" alt="Logo">
        <h1 style="color: white;">مطعم الفنان</h1>
        
        <a href="tel:+21627091965" class="btn">
            <div>اتصل بنا<br><span class="val">27 091 965</span></div>
            <div style="font-size: 25px;">📞</div>
        </a>

        <a href="https://www.facebook.com/profile.php?id=61561423656138" target="_blank" class="btn">
            <div>فيسبوك<br><span class="val">مطعم الفنان</span></div>
            <div style="font-size: 25px;">📘</div>
        </a>

        <a href="index.html" class="back">← الرجوع للرئيسية</a>
    </div>

</body>
</html>
