<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابي - مطعم الفنان</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c99a3d">
<link rel="apple-touch-icon" href="735043823_122232458936380788_691619389420209673_n (3).jpg">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
  --ink:#0f0c09;
  --panel:rgba(24,18,13,.68);
  --panel-solid:#1b140e;
  --gold:#c99a3d;
  --gold-light:#e8c874;
  --gold-dim:rgba(201,154,61,.35);
  --cream:#f3ead9;
  --cream-dim:rgba(243,234,217,.6);
  --burgundy:#5f2323;
  --err:#e0685f;
  --ok:#7cbf85;
}

body{

font-family:'Cairo',sans-serif;

background:
linear-gradient(
180deg,
rgba(10,7,5,.88),
rgba(10,7,5,.78) 40%,
rgba(10,7,5,.92)
),
url('unnamed (2).jpg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

min-height:100vh;
color:var(--cream);

display:flex;
justify-content:center;
align-items:flex-start;

overflow-y:auto;
overflow-x:hidden;

padding:40px 16px;
}

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background-image:
radial-gradient(circle at 20% 15%, rgba(201,154,61,.06), transparent 40%),
radial-gradient(circle at 85% 80%, rgba(201,154,61,.05), transparent 45%);
z-index:0;
}

.container{
width:100%;
max-width:420px;
text-align:center;
position:relative;
z-index:1;
animation:fade .8s ease;
}

@keyframes fade{
from{ opacity:0; transform:translateY(16px); }
to{ opacity:1; transform:translateY(0); }
}

.back-link{
display:inline-flex;
align-items:center;
gap:6px;
color:var(--cream-dim);
text-decoration:none;
font-size:13px;
font-weight:600;
margin-bottom:18px;
transition:.25s ease;
}
.back-link:hover{ color:var(--gold-light); }

.logo-wrap{
position:relative;
width:110px;
height:110px;
margin:auto;
margin-bottom:6px;
}

.logo{
width:110px;
height:110px;
border-radius:50%;
border:3px solid var(--gold);
overflow:hidden;
position:relative;
box-shadow:
0 0 0 6px rgba(15,12,9,.6),
0 0 30px rgba(201,154,61,.35);
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
filter:saturate(1.05) contrast(1.02);
}

.title{
font-family:'Amiri', serif;
font-size:32px;
font-weight:700;
color:var(--gold-light);
text-shadow:0 0 22px rgba(201,154,61,.55);
margin-top:14px;
margin-bottom:2px;
letter-spacing:1px;
}

.subtitle{
color:var(--cream-dim);
font-size:12px;
font-weight:600;
letter-spacing:3px;
text-transform:uppercase;
margin-bottom:26px;
}

.card{
width:100%;
padding:26px 22px;
border-radius:22px;
background:var(--panel);
backdrop-filter:blur(10px);
border:1px solid var(--gold-dim);
box-shadow:0 20px 45px rgba(0,0,0,.45);
}

.tabs{
display:flex;
background:rgba(15,12,9,.55);
border-radius:14px;
padding:4px;
margin-bottom:22px;
border:1px solid var(--gold-dim);
}

.tab{
flex:1;
padding:11px 0;
border:none;
background:transparent;
color:var(--cream-dim);
font-family:'Cairo',sans-serif;
font-weight:700;
font-size:14.5px;
border-radius:10px;
cursor:pointer;
transition:.25s ease;
}

.tab.active{
background:linear-gradient(135deg, var(--gold), #a97f2e);
color:var(--ink);
}

.form{
display:none;
flex-direction:column;
gap:14px;
text-align:right;
}
.form.active{ display:flex; }

.field label{
display:block;
font-size:12.5px;
color:var(--cream-dim);
margin-bottom:6px;
font-weight:600;
}

.field input{
width:100%;
padding:13px 14px;
border-radius:12px;
border:1px solid var(--gold-dim);
background:rgba(15,12,9,.55);
color:var(--cream);
font-family:'Cairo',sans-serif;
font-size:15px;
outline:none;
transition:.25s ease;
}

.field input:focus{
border-color:var(--gold);
box-shadow:0 0 0 3px rgba(201,154,61,.15);
}

.field input::placeholder{
color:rgba(243,234,217,.35);
}

.submit-btn{
margin-top:6px;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg, var(--gold-light), var(--gold));
color:var(--ink);
font-family:'Cairo',sans-serif;
font-weight:800;
font-size:16px;
cursor:pointer;
transition:.25s ease;
}
.submit-btn:hover{
filter:brightness(1.08);
transform:translateY(-1px);
}
.submit-btn:disabled{
opacity:.6;
cursor:default;
transform:none;
}

.msg{
font-size:13.5px;
font-weight:600;
min-height:18px;
text-align:center;
}
.msg.err{ color:var(--err); }
.msg.ok{ color:var(--ok); }

/* logged-in state */
#account-view{
display:none;
flex-direction:column;
gap:16px;
text-align:center;
}
#account-view.active{ display:flex; }

.avatar{
width:74px;
height:74px;
border-radius:50%;
margin:0 auto;
background:linear-gradient(135deg, var(--gold-light), var(--gold));
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:900;
color:var(--ink);
}

.acc-name{
font-family:'Amiri', serif;
font-size:22px;
color:var(--gold-light);
}

.acc-email{
font-size:13px;
color:var(--cream-dim);
}

.logout-btn{
margin-top:6px;
padding:13px;
border:1px solid var(--gold-dim);
border-radius:12px;
background:transparent;
color:var(--cream);
font-family:'Cairo',sans-serif;
font-weight:700;
font-size:14.5px;
cursor:pointer;
transition:.25s ease;
}
.logout-btn:hover{
background:rgba(201,154,61,.1);
color:var(--gold-light);
}

.footer{
margin-top:26px;
color:var(--cream-dim);
font-size:13px;
letter-spacing:.5px;
}
.footer span{
color:var(--gold-light);
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<a class="back-link" href="index.html">→ رجوع للرئيسية</a>

<div class="logo-wrap">
<div class="logo">
<img src="735043823_122232458936380788_691619389420209673_n (3).jpg">
</div>
</div>

<div class="title">حسابي</div>
<div class="subtitle">مطعم الفنان</div>

<div class="card">

<!-- Auth forms (shown when logged out) -->
<div id="auth-view">

<div class="tabs">
<button class="tab active" id="tab-login" onclick="switchTab('login')">تسجيل الدخول</button>
<button class="tab" id="tab-signup" onclick="switchTab('signup')">حساب جديد</button>
</div>

<form class="form active" id="form-login" onsubmit="return false;">
<div class="field">
<label>الإيميل</label>
<input type="email" id="login-email" placeholder="example@email.com" autocomplete="email" required>
</div>
<div class="field">
<label>كلمة السر</label>
<input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
</div>
<div class="msg" id="login-msg"></div>
<button class="submit-btn" id="login-btn" onclick="doLogin()">دخول</button>
</form>

<form class="form" id="form-signup" onsubmit="return false;">
<div class="field">
<label>الاسم</label>
<input type="text" id="signup-name" placeholder="اسمك" autocomplete="name" required>
</div>
<div class="field">
<label>الإيميل</label>
<input type="email" id="signup-email" placeholder="example@email.com" autocomplete="email" required>
</div>
<div class="field">
<label>كلمة السر</label>
<input type="password" id="signup-password" placeholder="6 حروف/أرقام على الأقل" autocomplete="new-password" required>
</div>
<div class="msg" id="signup-msg"></div>
<button class="submit-btn" id="signup-btn" onclick="doSignup()">إنشاء الحساب</button>
</form>

</div>

<!-- Logged-in view -->
<div id="account-view">
<div class="avatar" id="acc-avatar">ف</div>
<div class="acc-name" id="acc-name">-</div>
<div class="acc-email" id="acc-email">-</div>
<button class="logout-btn" onclick="doLogout()">تسجيل الخروج</button>
</div>

</div>

<div class="footer">
مطعم الفنان ✨ <br>
بحب من <span>الفنان</span> 🧡
</div>

</div>

<script type="module">

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  updateProfile
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

import {
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

import { db, app } from "./firebase.js";

const auth = getAuth(app);

window.switchTab = (which)=>{
  document.getElementById("tab-login").classList.toggle("active", which==="login");
  document.getElementById("tab-signup").classList.toggle("active", which==="signup");
  document.getElementById("form-login").classList.toggle("active", which==="login");
  document.getElementById("form-signup").classList.toggle("active", which==="signup");
  setMsg("login-msg","");
  setMsg("signup-msg","");
};

function setMsg(id, text, ok=false){
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = "msg" + (text ? (ok ? " ok" : " err") : "");
}

function translateError(code){
  const map = {
    "auth/invalid-email":"الإيميل ماشي صحيح",
    "auth/user-not-found":"ما فماش حساب بهذا الإيميل",
    "auth/wrong-password":"كلمة السر غالطة",
    "auth/invalid-credential":"الإيميل أو كلمة السر غالطة",
    "auth/email-already-in-use":"هذا الإيميل عندو حساب already",
    "auth/weak-password":"كلمة السر لازمها 6 حروف/أرقام على الأقل",
    "auth/too-many-requests":"محاولات برشة، جرب بعد شوية"
  };
  return map[code] || "صار خطأ، عاود جرب";
}

window.doLogin = async ()=>{
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const btn = document.getElementById("login-btn");
  setMsg("login-msg","");
  if(!email || !password){ setMsg("login-msg","عمر الخانات"); return; }
  btn.disabled = true; btn.textContent = "...دخول";
  try{
    await signInWithEmailAndPassword(auth, email, password);
  }catch(e){
    setMsg("login-msg", translateError(e.code));
  }finally{
    btn.disabled = false; btn.textContent = "دخول";
  }
};

window.doSignup = async ()=>{
  const name = document.getElementById("signup-name").value.trim();
  const email = document.getElementById("signup-email").value.trim();
  const password = document.getElementById("signup-password").value;
  const btn = document.getElementById("signup-btn");
  setMsg("signup-msg","");
  if(!name || !email || !password){ setMsg("signup-msg","عمر الخانات"); return; }
  btn.disabled = true; btn.textContent = "...نعمل الحساب";
  try{
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db, "users", cred.user.uid), {
      name,
      email,
      createdAt: serverTimestamp()
    });
  }catch(e){
    setMsg("signup-msg", translateError(e.code));
  }finally{
    btn.disabled = false; btn.textContent = "إنشاء الحساب";
  }
};

window.doLogout = async ()=>{
  await signOut(auth);
};

onAuthStateChanged(auth, (user)=>{
  const authView = document.getElementById("auth-view");
  const accView = document.getElementById("account-view");
  if(user){
    authView.style.display = "none";
    accView.classList.add("active");
    const name = user.displayName || "زبون";
    document.getElementById("acc-name").textContent = name;
    document.getElementById("acc-email").textContent = user.email || "";
    document.getElementById("acc-avatar").textContent = name.trim().charAt(0).toUpperCase();
  }else{
    authView.style.display = "block";
    accView.classList.remove("active");
  }
});

</script>

</body>
</html>
