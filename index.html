<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مطعم الفنان | Mbarek Prod</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
min-height:100vh;
color:white;
text-align:center;
overflow-x:hidden;

background:
linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.85)),
url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1600&auto=format&fit=crop");

background-size:cover;
background-position:center;
background-attachment:fixed;
}

.logo{
width:170px;
margin-top:25px;
border-radius:50%;
box-shadow:0 0 30px rgba(255,193,7,0.7);
}

h1{
color:#ffca28;
margin-top:10px;
}

.tagline{
color:#ddd;
margin-bottom:20px;
}

.container{
max-width:430px;
margin:auto;
padding:20px;
}

.card-btn{
width:100%;
padding:18px;
margin-top:15px;
border:none;
border-radius:25px;
font-size:18px;
cursor:pointer;
color:white;
background:linear-gradient(135deg,#ff9800,#e65100);
}

.admin-btn{
background:linear-gradient(135deg,#4caf50,#1b5e20);
}

#menu{
display:none;
margin-top:20px;
}

.menu-item{
background:rgba(255,255,255,0.08);
padding:15px;
margin-top:10px;
border-radius:15px;
}

#wheelResult{
margin-top:20px;
font-size:22px;
color:gold;
font-weight:bold;
}

</style>
</head>

<body>

<img src="go.png" class="logo">

<h1>مطعم الفنان</h1>
<p class="tagline">أشهى الأطباق التونسية</p>

<div class="container">

<button class="card-btn" onclick="toggleMenu()">
🍽️ قائمة اليوم
</button>

<button class="card-btn" onclick="spinWheel()">
🎡 عجلة الحظ
</button>

<button class="card-btn admin-btn" onclick="openAdmin()">
👨‍🍳 لوحة الشيف
</button>

<div id="menu">
<div class="menu-item">🍕 بيتزا - 15 د</div>
<div class="menu-item">🥘 إسكالوب - 18 د</div>
<div class="menu-item">🍟 فريت - 5 د</div>
</div>

<div id="wheelResult">🎡 استنى دورك...</div>

</div>

<script>

function toggleMenu(){
let menu = document.getElementById("menu");
menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* =========================
   🎡 SYSTEME WHEEL
========================= */

let spinCount = 0;

function spinWheel(){

spinCount++;

let box = document.getElementById("wheelResult");

// 🔁 spins 1 → 10
if(spinCount <= 10){

let msgs = ["🔄 عاود داور", "🚫 ارجع غدوة"];
box.innerHTML = msgs[Math.floor(Math.random()*msgs.length)];
return;
}

// 🏆 spin 11 = WIN
if(spinCount === 11){

let win = Math.random() < 0.5 ? "🍟 Portion Frit" : "🧀 Gezouza";

box.innerHTML = "🎉 مبروك ربحت: " + win;

spinCount = 0;
}
}

/* =========================
   ADMIN
========================= */

function openAdmin(){

let pass = prompt("🔐 Password");

if(pass === "0000omar1234"){
window.location.href = "admin.html";
}else{
alert("❌ خطأ");
}
}

</script>

</body>
</html>
