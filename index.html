<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الفنان</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <div class="main-content">
        <button class="card-btn" onclick="toggleMenu()">🍽️ قائمة اليوم</button>
        <button class="card-btn" onclick="window.location.href='wheel.html'">🎡 عجلة الحظ</button>
        <button class="card-btn" onclick="window.location.href='contact.html'">📞 اتصل بنا</button>
        <button class="card-btn" onclick="openAdmin()">👨‍🍳 لوحة الشيف</button>

        <div id="menu" style="display:none;">
            <div class="menu-item">جاري تحميل البيانات...</div>
        </div>
    </div>

    <script type="module">
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
        import { db } from "./firebase.js";

        const menuDiv = document.getElementById("menu");

        // هذي هي الخدمة: تحديث المنيو لايف من Firebase
        onSnapshot(doc(db, "menu", "today"), (docSnap) => {
            const data = docSnap.data();
            if (data) {
                menuDiv.innerHTML = `
                    <div class="menu-item">🍕 ${data.food1} — ${data.price1} د</div>
                    <div class="menu-item">🥘 ${data.food2} — ${data.price2} د</div>
                `;
            }
        });

        // دوال الأزرار
        window.toggleMenu = function() {
            menuDiv.style.display = (menuDiv.style.display === "block") ? "none" : "block";
        };

        window.openAdmin = function() {
            let attempts = parseInt(localStorage.getItem("adminAttempts") || 0);
            if (localStorage.getItem("blockedUntil") && new Date().getTime() < localStorage.getItem("blockedUntil")) {
                alert("⛔ تم غلق لوحة الشيف لمدة ساعة");
                return;
            }
            
            const password = prompt("🔐 كلمة السر:");
            if (password === "0000omar1234") {
                localStorage.setItem("adminAttempts", 0);
                window.location.href = "admin.html";
            } else {
                attempts++;
                localStorage.setItem("adminAttempts", attempts);
                if (attempts >= 3) {
                    localStorage.setItem("blockedUntil", new Date().getTime() + 3600000);
                }
                alert("❌ كلمة سر خاطئة");
            }
        };
    </script>

</body>
</html>
