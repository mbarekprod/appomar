<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الفنان</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            /* الخلفية الجديدة اللي بعثتها */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://i.ibb.co/JRShBbcf/background.jpg');
            background-size: cover; background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .logo-container {
            width: 180px; height: 180px; margin-bottom: 30px;
            border-radius: 50%; border: 3px solid #ffcc33;
            box-shadow: 0 0 40px rgba(255, 204, 51, 0.4);
            animation: float 4s ease-in-out infinite;
            overflow: hidden;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        .buttons-cadre {
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 204, 51, 0.5);
            display: flex; flex-direction: column; align-items: center;
            backdrop-filter: blur(15px);
            width: 300px;
        }

        .btn {
            width: 100%; padding: 14px; margin: 8px 0;
            background: transparent; border: 1px solid #ffcc33;
            border-radius: 50px; color: #ffcc33; text-align: center;
            font-weight: bold; cursor: pointer; transition: 0.4s;
            text-decoration: none; font-size: 17px;
        }
        .btn:hover { background: #ffcc33; color: #000; box-shadow: 0 0 20px #ffcc33; }

        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://i.ibb.co/svszNHtx/448924350-122100516512380788-8402045732983525719-n.jpg" alt="Logo">
    </div>

    <div class="buttons-cadre">
        <button class="btn" onclick="toggleMenu()">🍽️ قائمة اليوم</button>
        <button class="btn" onclick="window.location.href='wheel.html'">🎡 عجلة الحظ</button>
        <button class="btn" onclick="window.location.href='contact.html'">📞 اتصل بنا</button>
        <button class="btn" onclick="openAdmin()">👨‍🍳 لوحة الشيف</button>
    </div>

    <div id="menu-wrapper" style="display:none; width:300px; margin-top:20px; background:rgba(0,0,0,0.8); padding:15px; border-radius:15px; border:1px solid #ffcc33; color:#fff; text-align:center;">
        <div id="menu-content">جاري التحميل...</div>
    </div>

    <script type="module">
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
        import { db } from "./firebase.js";

        window.toggleMenu = () => {
            const m = document.getElementById("menu-wrapper");
            m.style.display = (m.style.display === "block") ? "none" : "block";
        };

        window.openAdmin = () => {
            const pass = prompt("🔐 كلمة سر الشيف:");
            if (pass === "0000omar1234") {
                window.location.href = "admin.html";
            } else if (pass !== null) {
                alert("❌ كلمة السر خاطئة!");
            }
        };

        onSnapshot(doc(db, "menu", "today"), (docSnap) => {
            const content = document.getElementById("menu-content");
            if (docSnap.exists()) {
                const d = docSnap.data();
                content.innerHTML = `🍕 ${d.food1} (${d.price1} د) <br> 🥘 ${d.food2} (${d.price2} د)`;
            }
        });
    </script>
</body>
</html>
