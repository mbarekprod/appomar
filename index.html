<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>مطعم الفنان</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Cairo',sans-serif;

background:
linear-gradient(
rgba(0,0,0,.7),
rgba(0,0,0,.7)
),

url('unnamed (2).jpg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow-x:hidden;

padding:30px 15px;
}

/* CONTAINER */

.container{

width:100%;
max-width:380px;

text-align:center;
}

/* LOGO */

.logo{

width:160px;
height:160px;

border-radius:50%;

border:4px solid #ffcc33;

margin:auto;
margin-bottom:20px;

overflow:hidden;

box-shadow:
0 0 15px #ffcc33,
0 0 40px rgba(255,204,51,.5);

animation:pulse 3s infinite;
}

.logo img{

width:100%;
height:100%;

object-fit:cover;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.03);
}

100%{
transform:scale(1);
}

}

/* CARD */

.card{

width:100%;

padding:22px;

border-radius:25px;

background:
rgba(0,0,0,.6);

border:2px solid #ffcc33;

backdrop-filter:blur(8px);

box-shadow:
0 0 35px rgba(255,204,51,.2);
}

/* BUTTONS */

.btn{

width:100%;

padding:16px;

margin:10px 0;

border:none;

border-radius:14px;

font-size:18px;
font-weight:700;

cursor:pointer;

background:
linear-gradient(
180deg,
#ffcc33,
#e6b800
);

color:black;

transition:.3s;

font-family:'Cairo',sans-serif;
}

.btn:hover{

transform:scale(1.03);

}

/* MENU */

#menu-wrapper{

display:none;

margin-top:15px;

color:#fff;

padding:15px;

border-top:1px solid #ffcc33;

font-size:18px;

line-height:2;
}

/* FOOTER */

.footer{

margin-top:20px;

color:white;

font-size:14px;
}

.footer span{

color:#ffcc33;
font-weight:bold;
}

/* SOCIAL */

.social-links{

margin-top:15px;

display:flex;
justify-content:center;
gap:20px;
}

.social-links a{

color:#ffcc33;

font-size:24px;

text-decoration:none;

transition:.3s;
}

.social-links a:hover{

transform:scale(1.2);
}

/* RESPONSIVE */

@media(max-width:500px){

.logo{

width:140px;
height:140px;
}

.btn{

font-size:17px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<img src="restaurant.jpg">

</div>

<div class="card">

<button class="btn"
onclick="toggleMenu()">

🍽️ قائمة اليوم

</button>

<button class="btn"
onclick="window.location.href='wheel.html'">

🎡 عجلة الحظ

</button>

<button class="btn"
onclick="window.location.href='contact.html'">

📞 اتصل بنا

</button>

<button class="btn"
onclick="openAdmin()">

👨‍🍳 لوحة الشيف

</button>

<!-- MENU -->

<div id="menu-wrapper">

<div id="menu-content">

🍕 لا توجد قائمة اليوم

</div>

</div>

</div>

<div class="footer">

مطعم الفنان ✨ <br>
بحب من <span>الفنان</span> 🧡

<div class="social-links">

<a href="#">📷</a>

<a href="#">👥</a>

<a href="#">🎵</a>

</div>

</div>

</div>

<script>

/* MENU */

function toggleMenu(){

let menu =
document.getElementById(
"menu-wrapper"
);

if(menu.style.display==="block"){

menu.style.display="none";

}
else{

menu.style.display="block";

}

}

/* ADMIN PANEL */

function openAdmin(){

let pass = prompt(
"🔐 دخل كلمة سر الشيف"
);

if(pass === "0000omar1234"){

let plat1 =
prompt("🍕 الطبق الأول");

let prix1 =
prompt("💰 سعر الطبق الأول");

let plat2 =
prompt("🥘 الطبق الثاني");

let prix2 =
prompt("💰 سعر الطبق الثاني");

if(plat1 && prix1){

document.getElementById(
"menu-content"
).innerHTML =

"🍕 " + plat1 +
" — " + prix1 + " د" +

"<br><br>" +

"🥘 " + plat2 +
" — " + prix2 + " د";

document.getElementById(
"menu-wrapper"
).style.display="block";

alert(
"✅ تم تحديث قائمة اليوم"
);

}

}

else if(pass !== null){

alert(
"❌ كلمة السر خاطئة"
);

}

}

</script>

</body>
</html>
