<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مطعم الفنان</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Cairo',sans-serif;

    background:
    linear-gradient(
        rgba(0,0,0,0.15),
        rgba(0,0,0,0.25)
    ),

    url('https://github.com/mbarekprod/appomar/blob/main/qq.png?raw=true');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    height:100vh;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    overflow:hidden;
}

/* TOP SHADOW */
body::before{

    content:'';

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:180px;

    background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.75),
        transparent
    );

    z-index:-1;
}

/* BOTTOM SHADOW */
body::after{

    content:'';

    position:fixed;

    bottom:0;
    left:0;

    width:100%;
    height:180px;

    background:linear-gradient(
        to top,
        rgba(0,0,0,0.75),
        transparent
    );

    z-index:-1;
}

.logo-container{

    width:160px;
    height:160px;

    border-radius:50%;

    overflow:hidden;

    border:4px solid #ffcc33;

    margin-bottom:25px;

    box-shadow:
    0 0 20px rgba(255,204,51,0.6),
    0 0 45px rgba(255,204,51,0.25);

    animation:glow 2s infinite alternate;
}

@keyframes glow{

    from{
        box-shadow:
        0 0 20px rgba(255,204,51,0.4),
        0 0 40px rgba(255,204,51,0.2);
    }

    to{
        box-shadow:
        0 0 35px rgba(255,204,51,0.8),
        0 0 65px rgba(255,204,51,0.35);
    }
}

.logo-container img{

    width:100%;
    height:100%;

    object-fit:cover;
}

.buttons-cadre{

    width:90%;
    max-width:340px;

    padding:25px 20px;

    border-radius:25px;

    background:rgba(0,0,0,0.50);

    border:2px solid rgba(255,204,51,0.8);

    backdrop-filter:blur(8px);

    box-shadow:
    0 0 25px rgba(255,204,51,0.20);

}

.btn{

    width:100%;

    padding:16px;

    margin:10px 0;

    border:none;
    border-radius:50px;

    background:rgba(255,204,51,0.10);

    border:2px solid #ffcc33;

    color:#ffcc33;

    font-size:18px;
    font-weight:700;

    font-family:'Cairo',sans-serif;

    cursor:pointer;

    transition:0.35s;
}

.btn:hover{

    background:#ffcc33;

    color:#000;

    transform:scale(1.04);

    box-shadow:
    0 0 20px rgba(255,204,51,0.6);
}

#menu-wrapper{

    display:none;

    width:90%;
    max-width:340px;

    margin-top:20px;

    padding:18px;

    border-radius:20px;

    background:rgba(0,0,0,0.75);

    border:1px solid #ffcc33;

    color:#ffcc33;

    text-align:center;

    line-height:2;

    backdrop-filter:blur(6px);

    box-shadow:
    0 0 20px rgba(255,204,51,0.15);
}

#menu-content{

    font-size:18px;
    font-weight:700;
}

@media(max-width:768px){

    body{
        background-position:center;
    }

    .logo-container{

        width:130px;
        height:130px;
    }

    .btn{

        font-size:16px;

        padding:14px;
    }
}

</style>
</head>

<body>

<div class="logo-container">

<img src="https://i.ibb.co/svszNHtx/448924350-122100516512380788-8402045732983525719-n.jpg">

</div>

<div class="buttons-cadre">

<button class="btn" onclick="toggleMenu()">
🍽️ قائمة اليوم
</button>

<button class="btn" onclick="window.location.href='wheel.html'">
🎡 عجلة الحظ
</button>

<button class="btn" onclick="window.location.href='contact.html'">
📞 اتصل بنا
</button>

<button class="btn" onclick="openAdmin()">
👨‍🍳 لوحة الشيف
</button>

</div>

<div id="menu-wrapper">

<div id="menu-content">
جاري التحميل...
</div>

</div>

<script type="module">

import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
import { db } from "./firebase.js";

window.toggleMenu = () => {

    const menu = document.getElementById("menu-wrapper");

    if(menu.style.display === "block"){

        menu.style.display = "none";

    }else{

        menu.style.display = "block";
    }
};

window.openAdmin = () => {

    const pass = prompt("🔐 دخل كلمة سر الشيف:");

    if(pass === "0000omar1234"){

        window.location.href = "admin.html";

    }else if(pass !== null){

        alert("❌ كلمة السر خاطئة!");
    }
};

onSnapshot(doc(db, "menu", "today"), (docSnap) => {

    const content = document.getElementById("menu-content");

    if(docSnap.exists()){

        const d = docSnap.data();

        content.innerHTML = `
        🍕 ${d.food1} — ${d.price1} د <br><br>
        🥘 ${d.food2} — ${d.price2} د
        `;
    }
});

</script>

</body>
</html>
