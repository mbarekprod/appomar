<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>مطعم الفنان</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap"
rel="stylesheet">

<style>

body{

margin:0;

padding:20px;

font-family:'Cairo',sans-serif;

background:
linear-gradient(
135deg,
#1a0a00,
#3b1200
);

color:white;

text-align:center;

overflow-x:hidden;
}

.logo{

width:150px;

margin-top:20px;

animation:
floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0px);
}
}

h1{

color:gold;

font-size:38px;

text-shadow:
0 0 20px rgba(255,215,0,0.7);
}

.tagline{

color:#ddd;

margin-bottom:30px;

font-size:18px;
}

.container{

max-width:420px;

margin:auto;
}

.card-btn{

width:100%;

padding:18px;

margin-top:15px;

border:none;

border-radius:25px;

font-size:19px;

font-weight:bold;

cursor:pointer;

color:white;

transition:0.3s;

background:
linear-gradient(
135deg,
#ff9800,
#e65100
);

box-shadow:
0 6px 15px rgba(0,0,0,0.4);
}

.card-btn:hover{

transform:
scale(1.04);

box-shadow:
0 0 25px rgba(255,152,0,0.6);
}

.admin-btn{

background:
linear-gradient(
135deg,
#4caf50,
#1b5e20
);
}

#menu{

display:none;

margin-top:30px;

animation:
fadeIn 0.5s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}
}

.menu-item{

background:
rgba(255,255,255,0.06);

padding:18px;

margin-top:15px;

border-radius:18px;

border:
1px solid rgba(255,215,0,0.3);

font-size:18px;

backdrop-filter:blur(6px);
}

</style>

</head>

<body>

<img src="go.png"
class="logo">

<h1>مطعم الفنان</h1>

<p class="tagline">
أشهى الأطباق والمأكولات التونسية
</p>

<div class="container">

<button class="card-btn"
onclick="toggleMenu()">

🍽️ قائمة اليوم

</button>

<button class="card-btn"
onclick="window.location.href='wheel.html'">

🎡 عجلة الحظ والجوائز

</button>

<button class="card-btn">

📞 اتصل بنا

</button>

<button
class="card-btn admin-btn"
onclick="openAdmin()">

👨‍🍳 لوحة الشيف

</button>

<div id="menu">

<div class="menu-item">
🍕 بيتزا خاصة — 15 د
</div>

<div class="menu-item">
🥘 إسكالوب — 18 د
</div>

<div class="menu-item">
🍟 فريت — 5 د
</div>

</div>

</div>

<script>

function toggleMenu(){

const menu =
document.getElementById("menu");

if(menu.style.display==="block"){

menu.style.display="none";

}else{

menu.style.display="block";
}
}

function openAdmin(){

const password =
prompt("🔐 أدخل كلمة سر الشيف");

if(password === "0000omar1234"){

window.location.href =
"admin.html";

}else{

alert("❌ كلمة السر خاطئة");
}

}

</script>

</body>
</html>
