<!DOCTYPE html>
<html lang="fr" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Fanen • Gastronomie</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c99a3d">
    <link rel="apple-touch-icon" href="735043823_122232458936380788_691619389420209673_n (3).jpg">

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #c99a3d;
            --gold-light: #e8c874;
            --gold-dim: rgba(201, 154, 61, 0.20);
            --gold-glow: rgba(201, 154, 61, 0.15);
            --dark: #0a0806;
            --panel: rgba(10, 8, 6, 0.78);
            --cream: #f3ead9;
            --cream-dim: rgba(243, 234, 217, 0.5);
            --cream-light: rgba(243, 234, 217, 0.08);
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(201, 154, 61, 0.06), transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(201, 154, 61, 0.04), transparent 50%),
                linear-gradient(180deg,
                    rgba(10, 8, 6, 0.95) 0%,
                    rgba(10, 8, 6, 0.80) 50%,
                    rgba(10, 8, 6, 0.95) 100%),
                url('unnamed (2).jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--cream);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 16px;
            min-height: 100vh;
        }

        /* ===== CONTAINER ===== */
        .container {
            width: 100%;
            max-width: 440px;
            animation: fadeUp 1s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 22px;
        }

        /* ===== LOGO ===== */
        .logo-wrap {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 6px;
        }

        .logo-ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1.5px solid var(--gold-dim);
            animation: spin 20s linear infinite;
        }

        .logo-ring::before,
        .logo-ring::after {
            content: "";
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--gold);
            top: -2.5px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 106px 0 0 var(--gold);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 0 30px var(--gold-glow);
            transition: transform 0.5s ease;
        }

        .logo:hover {
            transform: scale(1.04);
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== BRAND ===== */
        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            font-weight: 700;
            font-style: italic;
            color: var(--gold-light);
            text-shadow: 0 0 30px var(--gold-glow);
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .brand-sub {
            font-family: 'Cairo', sans-serif;
            color: var(--cream-dim);
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: -2px;
        }

        /* ===== CHEF MINI ===== */
        .chef-mini {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 10px auto 12px;
            padding: 6px 16px 6px 20px;
            background: var(--cream-light);
            border-radius: 50px;
            border: 1px solid var(--gold-dim);
            width: fit-content;
            animation: fadeUp 1.2s ease;
        }

        .chef-mini img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid var(--gold);
            object-fit: cover;
        }

        .chef-mini span {
            color: var(--cream-dim);
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .chef-mini span strong {
            color: var(--gold-light);
            font-weight: 600;
        }

        .divider {
            width: 60px;
            height: 1.5px;
            margin: 8px auto 14px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            animation: expandWidth 1s ease;
        }

        @keyframes expandWidth {
            from {
                width: 0;
                opacity: 0;
            }
            to {
                width: 60px;
                opacity: 1;
            }
        }

        /* ===== CARD ===== */
        .card {
            background: var(--panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid var(--gold-dim);
            padding: 12px 6px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* ===== BOUTONS RONDS ===== */
        .btn {
            width: 100%;
            padding: 16px 22px;
            border: none;
            border-bottom: 1px solid rgba(201, 154, 61, 0.06);
            background: transparent;
            color: var(--cream);
            font-size: 15px;
            font-weight: 500;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            text-align: right;
            position: relative;
            border-radius: 50px;
            transition: all 0.35s ease;
        }

        .card .btn:last-of-type {
            border-bottom: none;
        }

        .btn .label {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn .icon {
            font-size: 18px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(201, 154, 61, 0.08);
            border-radius: 50%;
            transition: all 0.35s ease;
            flex-shrink: 0;
        }

        .btn:hover .icon {
            background: var(--gold);
            color: var(--dark);
            transform: scale(1.05);
        }

        .btn .arrow {
            color: var(--gold);
            opacity: 0.25;
            font-size: 13px;
            transition: all 0.35s ease;
        }

        .btn:hover {
            background: rgba(201, 154, 61, 0.06);
            color: var(--gold-light);
            padding-right: 18px;
            padding-left: 24px;
        }

        .btn:hover .arrow {
            opacity: 1;
            transform: translateX(-4px);
        }

        /* ===== BOUTON SPÉCIAL (Carte Fidélité) ===== */
        .btn-special {
            background: linear-gradient(135deg, rgba(201, 154, 61, 0.08), rgba(201, 154, 61, 0.02));
            border: 1px solid var(--gold-dim);
            margin-bottom: 4px;
            animation: goldBreath 3s ease-in-out infinite;
        }

        .btn-special .icon {
            background: var(--gold);
            color: var(--dark);
        }

        @keyframes goldBreath {
            0%,
            100% {
                border-color: var(--gold-dim);
            }
            50% {
                border-color: var(--gold);
                box-shadow: 0 0 20px var(--gold-glow);
            }
        }

        /* ===== MENU WRAPPER ===== */
        #menu-wrapper {
            display: none;
            margin: 12px 16px 8px;
            padding: 18px 20px;
            border-radius: 20px;
            background: rgba(201, 154, 61, 0.04);
            border: 1px solid var(--gold-dim);
            text-align: center;
            font-size: 16px;
            line-height: 2.4;
            color: var(--cream);
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #menu-content .price {
            color: var(--gold-light);
            font-weight: 600;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px dashed rgba(201, 154, 61, 0.08);
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 26px;
            text-align: center;
            color: var(--cream-dim);
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .footer .heart {
            color: var(--gold-light);
            display: inline-block;
            animation: heartBeat 1.5s ease-in-out infinite;
        }

        @keyframes heartBeat {
            0%,
            100% {
                transform: scale(1);
            }
            15% {
                transform: scale(1.25);
            }
            30% {
                transform: scale(1);
            }
            45% {
                transform: scale(1.15);
            }
            60% {
                transform: scale(1);
            }
        }

        .footer .swash {
            width: 80px;
            height: 10px;
            margin: 10px auto 8px;
            opacity: 0.3;
        }

        .footer .swash path {
            fill: none;
            stroke: var(--gold);
            stroke-width: 1.5;
            stroke-linecap: round;
        }

        .footer .tagline {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--cream-dim);
            font-size: 13px;
            opacity: 0.6;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }

        .social-links a {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--gold-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 14px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            background: var(--gold);
            color: var(--dark);
            transform: translateY(-3px);
            box-shadow: 0 4px 15px var(--gold-glow);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .logo-wrap,
            .logo {
                width: 80px;
                height: 80px;
            }
            .logo-ring::before,
            .logo-ring::after {
                box-shadow: 0 86px 0 0 var(--gold);
            }
            .brand-name {
                font-size: 28px;
            }
            .btn {
                font-size: 14px;
                padding: 14px 16px;
                border-radius: 40px;
            }
            .btn .icon {
                width: 28px;
                height: 28px;
                font-size: 15px;
            }
            .chef-mini {
                padding: 4px 12px 4px 16px;
            }
            .chef-mini img {
                width: 26px;
                height: 26px;
            }
            .chef-mini span {
                font-size: 11px;
            }
        }
    </style>
</head>

<body>

    <!-- ===== SCRIPTS ===== -->
    <script type="module">
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
        import { db } from "./firebase.js";

        window.toggleMenu = () => {
            const wrapper = document.getElementById("menu-wrapper");
            if (wrapper.style.display === "block") {
                wrapper.style.display = "none";
            } else {
                wrapper.style.display = "block";
                wrapper.style.animation = "none";
                setTimeout(() => { wrapper.style.animation = "slideDown 0.4s ease"; }, 10);
            }
        };

        window.openAdmin = () => {
            const pass = prompt("🔐 Mot de passe Chef");
            if (pass === "0000omar1234") {
                window.location.href = "admin.html";
            } else if (pass !== null) {
                alert("❌ Code incorrect");
            }
        };

        onSnapshot(doc(db, "menu", "today"), (docSnap) => {
            const content = document.getElementById("menu-content");
            if (docSnap.exists()) {
                const d = docSnap.data();
                content.innerHTML = `
                    <div class="menu-item">
                        <span>${d.food1 || "—"}</span>
                        <span class="price">${d.price1 || "?"} DT</span>
                    </div>
                    <div class="menu-item">
                        <span>${d.food2 || "—"}</span>
                        <span class="price">${d.price2 || "?"} DT</span>
                    </div>
                `;
            } else {
                content.innerHTML = "❌ Aucun menu aujourd'hui";
            }
        });
    </script>

    <!-- ===== MUSIC & PWA ===== -->
    <script>
        // Music
        const music = document.getElementById("bgMusic");
        music.volume = 0.5;

        function applySavedTime() {
            try {
                const savedTime = localStorage.getItem("musicTime");
                if (savedTime && music.readyState > 0) {
                    music.currentTime = parseFloat(savedTime);
                }
            } catch (e) {}
        }

        if (music.readyState > 0) {
            applySavedTime();
        } else {
            music.addEventListener("loadedmetadata", applySavedTime);
        }

        setInterval(() => {
            try { localStorage.setItem("musicTime", music.currentTime); } catch (e) {}
        }, 1000);

        try {
            if (localStorage.getItem("musicMuted") === "true") { music.muted = true; }
        } catch (e) {}

        function startMusic() {
            music.play().catch(() => {});
        }

        window.addEventListener("load", startMusic);
        startMusic();

        function unlockOnce() {
            startMusic();
            document.removeEventListener("click", unlockOnce);
            document.removeEventListener("touchstart", unlockOnce);
            document.removeEventListener("scroll", unlockOnce);
            document.removeEventListener("keydown", unlockOnce);
        }

        document.addEventListener("click", unlockOnce);
        document.addEventListener("touchstart", unlockOnce);
        document.addEventListener("scroll", unlockOnce);
        document.addEventListener("keydown", unlockOnce);

        // PWA
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js").catch(() => {});
        }

        let deferredPrompt = null;
        const installBtn = document.getElementById("installBtn");

        const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
        const isStandalone = window.matchMedia("(display-mode: standalone)").matches ||
            window.navigator.standalone === true;

        window.addEventListener("beforeinstallprompt", (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (!isStandalone) installBtn.style.display = "flex";
        });

        if (isIOS && !isStandalone) {
            installBtn.style.display = "flex";
        }

        window.installApp = async function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
                installBtn.style.display = "none";
                return;
            }

            if (isIOS) {
                alert("📱 Pour installer l'application :\n\n1) Appuyez sur Partager 📤\n2) Choisissez « Ajouter à l'écran d'accueil »\n3) Appuyez sur « Ajouter »");
            } else {
                alert("📲 Pour installer l'application :\n\nAppuyez sur le menu ⋮ du navigateur, puis « Installer l'application ».");
            }
        };

        window.addEventListener("appinstalled", () => {
            installBtn.style.display = "none";
            deferredPrompt = null;
        });
    </script>
