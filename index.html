<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الفنان</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            /* استخدم صورة واجهة المطعم كخلفية */
            background: linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.7)), 
                        url('bgg.png');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container { width: 90%; max-width: 380px; text-align: center; }

        .logo {
            width: 150px; height: 150px; border-radius: 50%;
            border: 4px solid #ffcc33; margin-bottom: 20px;
            overflow: hidden; box-shadow: 0 0 15px #ffcc33;
        }
        .logo img { width: 100%; height: 100%; object-fit: cover; }

        .card {
            width: 100%; padding: 20px; border-radius: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #ffcc33;
        }

        .btn {
            width: 100%; padding: 15px; margin: 10px 0;
            border: none; border-radius: 12px;
            font-size: 18px; font-weight: 700; cursor: pointer;
            background: linear-gradient(180deg, #ffcc33, #e6b800);
            color: black; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.02); }

        #menu-wrapper { display: none; margin-top: 15px; color: #fff; padding: 10px; border-top: 1px solid #ffcc33; }

        .footer { margin-top: 20px; color: white; font-size: 14px; }
        .footer span { color: #ffcc33; font-weight: bold; }

        .social-links { margin-top: 15px; display: flex; justify-content: center; gap: 20px; }
        .social-links a { color: #ffcc33; font-size: 24px; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <img src="https://i.ibb.co/svszNHtx/448924350-122100516512380788-8402045732983525719-n.jpg" alt="Logo">
    </div>

    <div class="card">
        <button class="btn" onclick="toggleMenu()">🍽️ قائمة اليوم</button>
        <button class="btn" onclick="window.location.href='wheel.html'">🎡 عجلة الحظ</button>
        <button class="btn" onclick="window.location.href='contact.html'">📞 اتصل بنا</button>
        <button class="btn" onclick="openAdmin()">👨‍🍳 لوحة الشيف</button>

        <div id="menu-wrapper">
            <div id="menu-content">⏳ جاري تحميل القائمة...</div>
        </div>
    </div>

    <div class="footer">
        <span>مطعم الفنان</span><br>
        Good Food • Good Mood • Good People
        <div class="social-links">
            <a href="#">📷</a>
            <a href="#">👥</a>
            <a href="#">🎵</a>
        </div>
    </div>
</div>

<script type="module">
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
    import { db } from "./firebase.js";

    window.toggleMenu = () => {
        const menu = document.getElementById("menu-wrapper");
        menu.style.display = menu.style.display === "block" ? "none" : "block";
    };

    window.openAdmin = () => {
        const pass = prompt("🔐 دخل كلمة سر الشيف");
        if(pass === "0000omar1234") { window.location.href = "admin.html"; }
        else if(pass !== null) { alert("❌ كلمة السر خاطئة"); }
    };

    onSnapshot(doc(db, "menu", "today"), (docSnap) => {
        const content = document.getElementById("menu-content");
        if(docSnap.exists()){
            const d = docSnap.data();
            content.innerHTML = `🍕 ${d.food1} — ${d.price1} د<br><br>🥘 ${d.food2} — ${d.price2} د`;
        } else {
            content.innerHTML = "❌ لا توجد قائمة اليوم";
        }
    });
</script>

</body>
</html>
