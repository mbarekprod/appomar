<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الفنان</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap');
        
        body {
            margin: 0; padding: 20px;
            font-family: 'Cairo', sans-serif;
            background: #0d0d0d; /* خلفية سوداء نظيفة */
            color: #fff;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .logo-container {
            width: 150px; height: 150px; margin-bottom: 30px;
            border-radius: 50%; border: 2px solid #ffcc33;
            overflow: hidden;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        .buttons-cadre {
            width: 100%; max-width: 350px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .btn {
            padding: 15px;
            background: #1a1a1a; border: 1px solid #333;
            border-radius: 12px; color: #ffcc33;
            text-align: center; font-size: 16px;
            text-decoration: none; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { border-color: #ffcc33; background: #222; }

        #menu-wrapper { 
            display: none; width: 100%; max-width: 350px; margin-top: 20px;
            background: #1a1a1a; padding: 20px; border-radius: 12px;
            text-align: center; border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://i.ibb.co/svszNHtx/448924350-122100516512380788-8402045732983525719-n.jpg" alt="Logo">
    </div>

    <div class="buttons-cadre">
        <button class="btn" onclick="toggleMenu()">🍽️ قائمة اليوم</button>
        <button class="btn" onclick="window.location.href='wheel.html'">🎡 عجلة الحظ</button>
        <button class="btn" onclick="window.location.href='contact.html'">📞 اتصل بنا</button>
        <button class="btn" onclick="openAdmin()">👨‍🍳 لوحة الشيف</button>
    </div>

    <div id="menu-wrapper">
        <div id="menu-content">جاري التحميل...</div>
    </div>

    <script type="module">
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
        import { db } from "./firebase.js";

        window.toggleMenu = () => {
            const m = document.getElementById("menu-wrapper");
            m.style.display = (m.style.display === "block") ? "none" : "block";
        };

        window.openAdmin = () => {
            const pass = prompt("🔐 كلمة السر:");
            if (pass === "0000omar1234") {
                window.location.href = "admin.html";
            }
        };

        onSnapshot(doc(db, "menu", "today"), (docSnap) => {
            const content = document.getElementById("menu-content");
            if (docSnap.exists()) {
                const d = docSnap.data();
                content.innerHTML = `<div>🍕 ${d.food1} — ${d.price1} د</div><div style="margin-top:10px;">🥘 ${d.food2} — ${d.price2} د</div>`;
            }
        });
    </script>
</body>
</html>
