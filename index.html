<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>مطعم الفنان</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap"
rel="stylesheet">

<style>

body{

margin:0;

padding:20px;

font-family:'Cairo',sans-serif;

background:#1a0a00;

color:white;

text-align:center;
}

.logo{

width:140px;

margin-top:20px;

animation:
upDown 3s infinite ease-in-out;
}

@keyframes upDown{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0);
}
}

h1{

color:gold;
}

.container{

max-width:400px;

margin:auto;
}

button{

width:100%;

padding:16px;

margin-top:15px;

border:none;

border-radius:20px;

font-size:18px;

font-weight:bold;

cursor:pointer;

background:
linear-gradient(
135deg,
#ff9800,
#e65100
);

color:white;
}

button:hover{

transform:scale(1.03);
}

.download{

background:
linear-gradient(
135deg,
#2196f3,
#0d47a1
);
}

.admin{

background:
linear-gradient(
135deg,
#4caf50,
#1b5e20
);
}

#menu{

display:none;

margin-top:25px;
}

.menu-item{

background:
rgba(255,255,255,0.05);

padding:15px;

margin-top:10px;

border-radius:15px;

border:
1px solid gold;
}

</style>

</head>

<body>

<img src="go.png"
class="logo">

<h1>مطعم الفنان</h1>

<p>
أشهى الأطباق والمأكولات التونسية
</p>

<div class="container">

<button onclick="toggleMenu()">
🍽️ قائمة اليوم
</button>

<button onclick="window.location.href='wheel.html'">
🎡 عجلة الحظ والجوائز
</button>

<button>
📞 اتصل بنا
</button>

<button class="download"
onclick="downloadApp()">
⬇️ تنزيل التطبيق
</button>

<button class="admin"
onclick="window.location.href='admin.html'">
👨‍🍳 لوحة الشيف
</button>

<div id="menu">

<div class="menu-item">
🍕 Pizza — 15 د
</div>

<div class="menu-item">
🥘 Escalope — 18 د
</div>

</div>

</div>

<script>

function toggleMenu(){

const menu =
document.getElementById("menu");

if(menu.style.display==="block"){

menu.style.display="none";

}else{

menu.style.display="block";
}
}

function downloadApp(){

window.open(
"https://mbarekprod.github.io/appomar/",
"_blank"
);
}

</script>

</body>
</html>
