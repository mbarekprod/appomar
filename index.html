<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الفنان</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body {
            margin: 0; padding: 20px;
            font-family: 'Cairo', sans-serif;
            /* اللوغو ولى هو الخلفية - contain تخليه كامل وموش مبكسل */
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://github.com/mbarekprod/appomar/blob/main/qq.png?raw=true');
            background-size: contain; 
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .logo-container {
            width: 180px; height: 180px; margin-bottom: 30px;
            border-radius: 50%; border: 5px solid #ffcc33;
            box-shadow: 0 0 40px #ffcc33;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        .buttons-cadre {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid #ffcc33;
            display: flex; flex-direction: column; align-items: center;
            width: 320px;
        }

        .btn {
            display: block; width: 100%; 
            padding: 20px;
            margin: 12px 0;
            background: rgba(255, 204, 51, 0.1); 
            border: 2px solid #ffcc33;
            border-radius: 50px; 
            color: #ffcc33; 
            text-align: center;
            text-decoration: none; 
            font-weight: 900;
            font-size: 20px;
            transition: 0.4s;
        }
        .btn:hover { 
            background: #ffcc33; 
            color: black; 
            transform: scale(1.05); 
            box-shadow: 0 0 20px #ffcc33;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://i.ibb.co/svszNHtx/448924350-122100516512380788-8402045732983525719-n.jpg" alt="Logo">
    </div>

    <div class="buttons-cadre">
        <button class="btn" onclick="window.location.href='index.html'">🍽️ قائمة اليوم</button>
        <button class="btn" onclick="window.location.href='wheel.html'">🎡 عجلة الحظ</button>
        <button class="btn" onclick="window.location.href='contact.html'">📞 اتصل بنا</button>
        <button class="btn" onclick="alert('كلمة السر مطلوبة')">👨‍🍳 لوحة الشيف</button>
    </div>

</body>
</html>
