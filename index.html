```
<!-- HEADER -->
<header class="header">

    <div class="logo-ring">
        <img src="go.png" alt="مطعم الفنان" class="logo">
    </div>

    <h1 class="brand-name">مطعم الفنان</h1>

    <p class="tagline">
        أشهى الأطباق والمأكولات التونسية
    </p>

</header>

<!-- MAIN BUTTONS -->
<main class="main-menu">

    <button class="card-btn" onclick="showSection('menu')">
        🍽️ قائمة اليوم
    </button>

    <button class="card-btn" onclick="window.location.href='wheel.html'">
        🎡 عجلة الحظ والجوائز
    </button>

    <button class="card-btn" onclick="showSection('contact')">
        📞 اتصل بنا
    </button>

</main>

<!-- MENU -->
<section id="menu" class="section hidden">

    <h2>🍽️ قائمة اليوم</h2>

    <div id="dynamic-menu">

        <div class="menu-item">
            <span>🍕 بيتزا 4 فصول</span>
            <strong>18 د</strong>
        </div>

        <div class="menu-item">
            <span>🥘 لازانيا</span>
            <strong>10 د</strong>
        </div>

        <div class="menu-item">
            <span>🍲 لوبيا</span>
            <strong>5.5 د</strong>
        </div>

        <div class="menu-item">
            <span>🍝 مقرونة بالقمرون</span>
            <strong>12 د</strong>
        </div>

    </div>

</section>

<!-- CONTACT -->
<section id="contact" class="section hidden">

    <h2>📞 اتصل بنا</h2>

    <a href="tel:+21627091965" class="action-btn">
        📞 27 091 965
    </a>

    <a href="https://wa.me/21627091965" target="_blank" class="action-btn whatsapp">
        💬 اطلب عبر واتساب
    </a>

    <div class="address">
        📍 حزق - بجانب مخبر التحاليل و ميتاقلاس
    </div>

</section>

<!-- FOOTER -->
<footer>
    <p>Restaurant El Fanen © 2026</p>
</footer>

<script>

    function showSection(sectionId) {

        document.querySelectorAll('.section').forEach(section => {
            section.classList.add('hidden');
        });

        document.getElementById(sectionId).classList.remove('hidden');
    }

    // تحميل المنيو من لوحة الشيف
    const menu = JSON.parse(localStorage.getItem('fananMenu'));

    if (menu && menu.length > 0) {

        let html = '';

        menu.forEach(item => {

            if (item.name && item.price) {

                html += `
                <div class="menu-item">
                    <span>${item.name}</span>
                    <strong>${item.price}</strong>
                </div>
                `;
            }

        });

        if (html !== '') {
            document.getElementById('dynamic-menu').innerHTML = html;
        }
    }

</script>
```
