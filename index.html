<script>
    // الدالة المسؤولة على جلب المنيو من الذاكرة وعرضه للحريف
    function displayMenu() {
        const menu = JSON.parse(localStorage.getItem('fananMenu'));
        // استعملنا الـ ID الموجود أصلاً في الـ HTML متاعك
        const menuContainer = document.getElementById('dynamic-menu-list'); 
        
        if (menu && menuContainer) {
            // كود الـ HTML اللي باش يظهر للحريف
            menuContainer.innerHTML = menu.map(item => `
                <div class="menu-item" style="border-bottom: 1px solid #f5c842; padding: 10px; margin: 10px 0;">
                    <h3 style="margin: 0;">${item.name}</h3>
                    <p style="margin: 5px 0;">السعر: ${item.price} د.ت</p>
                </div>
            `).join('');
        }
    }

    // تشغيل الدالة كي يتحل الموقع
    window.onload = () => {
        displayMenu();
        // أي كود آخر عندك (مثل الـ Install button) خليه يخدم عادي
    };

    // دالة فتح الأقسام (باش ما تتلخبطش مع كود المنيو)
    function showSection(sectionId) {
        document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
        document.getElementById(sectionId).classList.remove('hidden');
    }
</script>
