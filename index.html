<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مطعم الفنان</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Cairo',sans-serif;

background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1974&auto=format&fit=crop');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;
}

/* CONTAINER */

.container{

width:90%;
max-width:380px;

display:flex;
flex-direction:column;
align-items:center;

animation:fade .8s ease;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* LOGO */

.logo{

width:170px;
height:170px;

border-radius:50%;
overflow:hidden;

border:4px solid #ffcc33;

box-shadow:
0 0 20px #ffcc33,
0 0 40px rgba(255,204,51,.7);

margin-bottom:25px;
}

.logo img{

width:100%;
height:100%;
object-fit:cover;

}

/* CARD */

.card{

width:100%;

padding:25px;

border-radius:30px;

background:rgba(0,0,0,.72);

backdrop-filter:blur(8px);

border:2px solid rgba(255,204,51,.7);

box-shadow:
0 0 25px rgba(255,204,51,.25);

}

/* BUTTONS */

.btn{

width:100%;

padding:16px;

margin:12px 0;

border:none;
border-radius:50px;

font-size:18px;
font-weight:700;

font-family:'Cairo',sans-serif;

cursor:pointer;

transition:.35s;

background:linear-gradient(45deg,#ffcc33,#ff9900);

color:black;

box-shadow:
0 5px 15px rgba(255,153,0,.35);

}

.btn:hover{

transform:translateY(-3px) scale(1.02);

box-shadow:
0 10px 25px rgba(255,153,0,.55);

}

/* MENU */

#menu-wrapper{

display:none;

margin-top:18px;

padding:18px;

border-radius:20px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,204,51,.5);

color:#fff;

font-size:18px;

line-height:2;

text-align:center;
}

/* FOOTER */

.footer{

margin-top:22px;

text-align:center;

color:white;

font-size:14px;

text-shadow:0 0 10px black;
}

.footer span{

color:#ffcc33;
font-weight:bold;

}

@media(max-width:500px){

.logo{

width:140px;
height:140px;

}

.btn{

font-size:16px;
padding:14px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<img src="https://i.ibb.co/svszNHtx/448924350-122100516512380788-8402045732983525719-n.jpg">

</div>

<div class="card">

<button class="btn" onclick="toggleMenu()">

🍽️ قائمة اليوم

</button>

<button class="btn"
onclick="window.location.href='wheel.html'">

🎡 عجلة الحظ

</button>

<button class="btn"
onclick="window.location.href='contact.html'">

📞 اتصل بنا

</button>

<button class="btn"
onclick="openAdmin()">

👨‍🍳 لوحة الشيف

</button>

<div id="menu-wrapper">

<div id="menu-content">

⏳ جاري تحميل القائمة...

</div>

</div>

</div>

<div class="footer">

<span>مطعم الفنان</span><br>

Good Food • Good Mood • Good People

</div>

</div>


<script type="module">

import { doc,onSnapshot }
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

import { db }
from "./firebase.js";


window.toggleMenu=()=>{

const menu=
document.getElementById(
"menu-wrapper"
);

menu.style.display=
menu.style.display==="block"
?"none"
:"block";

};


window.openAdmin=()=>{

const pass=prompt(
"🔐 دخل كلمة سر الشيف"
);

if(pass==="0000omar1234"){

window.location.href=
"admin.html";

}

else if(pass!==null){

alert(
"❌ كلمة السر خاطئة"
);

}

};


onSnapshot(

doc(
db,
"menu",
"today"
),

(docSnap)=>{

const content=
document.getElementById(
"menu-content"
);

if(docSnap.exists()){

const d=
docSnap.data();

content.innerHTML=`

🍕 ${d.food1}
— ${d.price1} د

<br><br>

🥘 ${d.food2}
— ${d.price2} د

`;

}

else{

content.innerHTML=
"❌ لا توجد قائمة اليوم";

}

}

);

</script>

</body>
</html>
