<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>مطعم الفنان</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
  --ink:#0f0c09;
  --panel:rgba(24,18,13,.68);
  --panel-solid:#1b140e;
  --gold:#c99a3d;
  --gold-light:#e8c874;
  --gold-dim:rgba(201,154,61,.35);
  --cream:#f3ead9;
  --cream-dim:rgba(243,234,217,.6);
  --burgundy:#5f2323;
}

body{

font-family:'Cairo',sans-serif;

background:

linear-gradient(
180deg,
rgba(10,7,5,.88),
rgba(10,7,5,.78) 40%,
rgba(10,7,5,.92)
),

url('unnamed (2).jpg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

min-height:100vh;
color:var(--cream);

display:flex;
justify-content:center;
align-items:flex-start;

overflow-y:auto;
overflow-x:hidden;

padding:40px 16px;
}

/* subtle canvas-grain texture over everything */
body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background-image:
radial-gradient(circle at 20% 15%, rgba(201,154,61,.06), transparent 40%),
radial-gradient(circle at 85% 80%, rgba(201,154,61,.05), transparent 45%);
z-index:0;
}

/* CONTAINER */

.container{

width:100%;
max-width:420px;

text-align:center;
position:relative;
z-index:1;

animation:fade .8s ease;
}

@keyframes fade{
from{ opacity:0; transform:translateY(16px); }
to{ opacity:1; transform:translateY(0); }
}

/* LOGO */

.logo-wrap{
position:relative;
width:168px;
height:168px;
margin:auto;
margin-bottom:6px;
}

.logo-ring{
position:absolute;
inset:-10px;
border-radius:50%;
border:1.5px solid var(--gold-dim);
animation:spin 40s linear infinite;
}

.logo-ring::before,
.logo-ring::after{
content:"";
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:var(--gold);
top:-3px;
left:50%;
transform:translateX(-50%);
box-shadow:0 176px 0 0 var(--gold);
}

@keyframes spin{
to{ transform:rotate(360deg); }
}

.logo{

width:168px;
height:168px;

border-radius:50%;

border:3px solid var(--gold);

overflow:hidden;
position:relative;

box-shadow:
0 0 0 6px rgba(15,12,9,.6),
0 0 30px rgba(201,154,61,.35);
}

.logo img{

width:100%;
height:100%;

object-fit:cover;
filter:saturate(1.05) contrast(1.02);
}

/* signature brush-stroke swash under title */
.swash{
width:220px;
height:26px;
margin:2px auto 14px;
display:block;
}

.swash path{
fill:none;
stroke:url(#swashGrad);
stroke-width:4;
stroke-linecap:round;
stroke-dasharray:340;
stroke-dashoffset:340;
animation:draw 1.4s .3s ease forwards;
}

@keyframes draw{
to{ stroke-dashoffset:0; }
}

/* TITLES */

.title{

font-family:'Amiri', serif;
font-size:44px;
font-weight:700;

color:var(--gold-light);

text-shadow:
0 0 22px rgba(201,154,61,.55);

margin-top:18px;
margin-bottom:2px;
letter-spacing:1px;
}

.subtitle{

color:var(--cream-dim);

font-size:12px;
font-family:'Cairo',sans-serif;
font-weight:600;

letter-spacing:3px;
text-transform:uppercase;

margin-bottom:28px;
}

/* CARD */

.card{

width:100%;

padding:10px 8px;

border-radius:22px;

background:var(--panel);

backdrop-filter:blur(10px);

border:1px solid var(--gold-dim);

box-shadow:
0 20px 45px rgba(0,0,0,.45);
}

/* MENU ROW BUTTONS */

.btn{

width:100%;

padding:18px 20px;

margin:0;
border:none;
border-bottom:1px solid rgba(201,154,61,.16);

background:transparent;

color:var(--cream);

font-size:17px;
font-weight:700;
font-family:'Cairo',sans-serif;

cursor:pointer;

display:flex;
align-items:center;
justify-content:space-between;
gap:12px;

transition:.25s ease;
text-align:right;
}

.card .btn:last-of-type{
border-bottom:none;
}

.btn .label{
display:flex;
align-items:center;
gap:12px;
}

.btn .ic{
font-size:20px;
filter:grayscale(.15);
}

.btn .arrow{
color:var(--gold);
opacity:.55;
transition:.25s ease;
font-size:15px;
}

.btn:hover{
background:rgba(201,154,61,.08);
color:var(--gold-light);
padding-right:14px;
padding-left:26px;
}

.btn:hover .arrow{
opacity:1;
transform:translateX(-4px);
}

/* MENU */

#menu-wrapper{

display:none;

margin:14px 10px 6px;

padding:18px;

border-radius:16px;

background:
linear-gradient(180deg, rgba(201,154,61,.08), rgba(201,154,61,.02));

border:1px solid var(--gold-dim);

color:var(--cream);

font-size:17px;
line-height:2;
text-align:center;
}

/* FOOTER */

.footer{

margin-top:30px;

color:var(--cream-dim);

font-size:13px;
letter-spacing:.5px;
}

.footer span{

color:var(--gold-light);
font-weight:bold;
}

.foot-swash{
width:120px;
height:14px;
margin:14px auto 10px;
opacity:.7;
}

.foot-swash path{
fill:none;
stroke:var(--gold);
stroke-width:2.5;
stroke-linecap:round;
}

/* SOCIAL */

.social-links{

margin-top:14px;

display:flex;
justify-content:center;
gap:18px;
}

.social-links a{

width:38px;
height:38px;
border-radius:50%;
border:1px solid var(--gold-dim);

display:flex;
align-items:center;
justify-content:center;

color:var(--gold);

font-size:17px;
text-decoration:none;

transition:.25s ease;
}

.social-links a:hover{
background:var(--gold);
color:var(--ink);
transform:translateY(-3px);
}

/* MOBILE */

@media(max-width:500px){

.logo, .logo-wrap{
width:140px;
height:140px;
}

.logo-ring::before,
.logo-ring::after{
box-shadow:0 148px 0 0 var(--gold);
}

.title{
font-size:36px;
}

.btn{
font-size:15.5px;
padding:16px 14px;
}

}

</style>

</head>

<body>

<audio id="bgMusic" loop autoplay playsinline>
<source src="sanfara.mp3" type="audio/mpeg">
Votre navigateur ne supporte pas l'audio.
</audio>

<div class="container">

<div class="logo-wrap">
<div class="logo-ring"></div>
<div class="logo">
<img src="735043823_122232458936380788_691619389420209673_n (3).jpg">
</div>
</div>

<div class="title">مطعم الفنان</div>

<svg class="swash" viewBox="0 0 220 26" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="swashGrad" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#c99a3d" stop-opacity="0"/>
<stop offset="15%" stop-color="#e8c874"/>
<stop offset="85%" stop-color="#e8c874"/>
<stop offset="100%" stop-color="#c99a3d" stop-opacity="0"/>
</linearGradient>
</defs>
<path d="M6,14 C55,2 90,24 110,13 C130,3 165,22 214,10"/>
</svg>

<div class="subtitle">Good Food • Good Mood • Good People</div>

<div class="card">

<button class="btn" onclick="toggleMenu()">
<span class="label"><span class="ic">🍽️</span>قائمة اليوم</span>
<span class="arrow">‹</span>
</button>

<button class="btn" onclick="window.location.href='menu.html'">
<span class="label"><span class="ic">📋</span>المنيو الكامل</span>
<span class="arrow">‹</span>
</button>

<button class="btn" onclick="window.location.href='wheel.html'">
<span class="label"><span class="ic">🎡</span>عجلة الحظ</span>
<span class="arrow">‹</span>
</button>

<button class="btn" onclick="window.location.href='contact.html'">
<span class="label"><span class="ic">📞</span>اتصل بنا</span>
<span class="arrow">‹</span>
</button>

<button class="btn" onclick="window.location.href='cv.html'">
<span class="label"><span class="ic">👨‍🍳</span>CV الشيف</span>
<span class="arrow">‹</span>
</button>

<button class="btn" onclick="window.open('https://maps.app.goo.gl/tZCRQV84MwNQhEZg9')">
<span class="label"><span class="ic">📍</span>موقع المطعم</span>
<span class="arrow">‹</span>
</button>

<button class="btn" onclick="openAdmin()">
<span class="label"><span class="ic">👨‍🍳</span>لوحة الشيف</span>
<span class="arrow">‹</span>
</button>

<div id="menu-wrapper">
<div id="menu-content">
جاري تحميل القائمة...
</div>
</div>

</div>

<div class="footer">

مطعم الفنان ✨

<svg class="foot-swash" viewBox="0 0 120 14" xmlns="http://www.w3.org/2000/svg">
<path d="M4,7 C30,1 45,13 60,7 C75,1 90,13 116,7"/>
</svg>

بحب من <span>الفنان</span> 🧡

<div class="social-links">
<a href="#">📷</a>
<a href="#">👥</a>
<a href="#">🎵</a>
</div>

</div>

</div>

<script type="module">

import {
doc,
onSnapshot
}

from
"https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

import { db }
from "./firebase.js";

/* MENU */

window.toggleMenu = ()=>{

let menu =
document.getElementById(
"menu-wrapper"
);

menu.style.display =

menu.style.display === "block"

? "none"

: "block";

};

/* ADMIN PASSWORD */

window.openAdmin = ()=>{

let pass = prompt(
"🔐 دخل كلمة سر الشيف"
);

if(pass === "0000omar1234"){

window.location.href =
"admin.html";

}

else if(pass !== null){

alert(
"❌ كلمة السر خاطئة"
);

}

};

/* LOAD MENU */

onSnapshot(

doc(
db,
"menu",
"today"
),

(docSnap)=>{

let content =
document.getElementById(
"menu-content"
);

if(docSnap.exists()){

let d =
docSnap.data();

content.innerHTML = `

🍕 ${d.food1}
— ${d.price1} د

<br><br>

🥘 ${d.food2}
— ${d.price2} د

`;

}

else{

content.innerHTML =
"❌ لا توجد قائمة اليوم";

}

}

);

</script>

<script>
const music = document.getElementById("bgMusic");
music.volume = 0.5;

/* resume from where the last page left off */
const savedTime = localStorage.getItem("musicTime");
if (savedTime) {
    music.currentTime = parseFloat(savedTime);
}

setInterval(() => {
    localStorage.setItem("musicTime", music.currentTime);
}, 1000);

const muted = localStorage.getItem("musicMuted");
if (muted === "true") {
    music.muted = true;
}

function startMusic() {
    music.play().catch(() => {});
}

/* try to play immediately when the page loads */
window.addEventListener("load", startMusic);
startMusic();

/* browsers that block autoplay will need a first interaction —
   this catches the very first click/touch/scroll/key anywhere
   on the page, then stops listening */
function unlockOnce() {
    startMusic();
    document.removeEventListener("click", unlockOnce);
    document.removeEventListener("touchstart", unlockOnce);
    document.removeEventListener("scroll", unlockOnce);
    document.removeEventListener("keydown", unlockOnce);
}

document.addEventListener("click", unlockOnce);
document.addEventListener("touchstart", unlockOnce);
document.addEventListener("scroll", unlockOnce);
document.addEventListener("keydown", unlockOnce);
</script>

</body>
</html>
