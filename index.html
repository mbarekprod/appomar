<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مطعم الفنان</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{

font-family:'Cairo',sans-serif;

background:black;

overflow-x:hidden;
}

body{

min-height:100vh;

padding:40px 15px;

position:relative;
}

/* BACKGROUND */

.bg{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background-image:url('restaurant.jpg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;

z-index:-3;

transform:scale(1.05);
}

/* OVERLAY */

.overlay{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:
rgba(0,0,0,.72);

z-index:-2;
}

/* GOLD LIGHT */

.light{

position:fixed;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

width:700px;
height:700px;

background:
radial-gradient(
circle,
rgba(255,204,51,.18),
transparent 70%
);

z-index:-1;

animation:glow 5s infinite alternate;
}

@keyframes glow{

0%{
transform:
translate(-50%,-50%)
scale(1);
}

100%{
transform:
translate(-50%,-50%)
scale(1.15);
}

}

/* CONTAINER */

.container{

width:100%;
max-width:420px;

margin:auto;

text-align:center;

padding-bottom:60px;
}

/* LOGO */

.logo{

width:190px;
height:190px;

margin:auto;

border-radius:50%;

overflow:hidden;

border:4px solid #ffcc33;

box-shadow:

0 0 25px #ffcc33,
0 0 80px rgba(255,204,51,.7);

animation:pulse 3s infinite;
}

.logo img{

width:100%;
height:100%;

object-fit:cover;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.03);
}

100%{
transform:scale(1);
}

}

/* TITLE */

.title{

font-size:42px;
font-weight:900;

margin-top:25px;

color:#ffcc33;

text-shadow:
0 0 15px rgba(255,204,51,.8);
}

.subtitle{

margin-top:8px;

font-size:15px;

color:white;

letter-spacing:2px;
}

/* CARD */

.card{

margin-top:30px;

padding:28px;

border-radius:35px;

background:
rgba(0,0,0,.72);

backdrop-filter:blur(10px);

border:
2px solid rgba(255,204,51,.7);

box-shadow:
0 0 40px rgba(255,204,51,.25);
}

/* BUTTONS */

.btn{

width:100%;

padding:18px;

margin:12px 0;

border:none;

border-radius:50px;

cursor:pointer;

font-size:22px;
font-weight:900;

font-family:'Cairo',sans-serif;

background:
linear-gradient(
180deg,
#ffd84d,
#ffb300
);

color:black;

transition:.3s;
}

.btn:hover{

transform:scale(1.03);
}

/* MENU */

#menu{

display:none;

margin-top:20px;

padding:20px;

border-radius:25px;

background:
rgba(0,0,0,.85);

border:
2px solid #ffcc33;

color:white;

font-size:20px;

line-height:2;
}

/* FOOTER */

.footer{

margin-top:30px;

color:white;

font-size:15px;

padding-bottom:40px;
}

.footer span{

color:#ffcc33;
font-weight:bold;
}

@media(max-width:500px){

.logo{

width:160px;
height:160px;
}

.title{

font-size:34px;
}

.btn{

font-size:18px;
padding:16px;
}

}

</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="light"></div>

<div class="container">

<div class="logo">

<img src="restaurant.jpg">

</div>

<div class="title">

مطعم الفنان

</div>

<div class="subtitle">

Good Food • Good Mood • Good People

</div>

<div class="card">

<button class="btn"
onclick="toggleMenu()">

🍽️ قائمة اليوم

</button>

<button class="btn"
onclick="window.location.href='wheel.html'">

🎡 عجلة الحظ

</button>

<button class="btn"
onclick="window.location.href='contact.html'">

📞 اتصل بنا

</button>

<button class="btn"
onclick="openAdmin()">

👨‍🍳 لوحة الشيف

</button>

<!-- MENU -->

<div id="menu">

🍕 لا توجد قائمة اليوم

</div>

</div>

<div class="footer">

بحب من <span>الفنان</span> 🧡

</div>

</div>

<script>

/* MENU */

function toggleMenu(){

let menu =
document.getElementById("menu");

if(menu.style.display==="block"){

menu.style.display="none";

}
else{

menu.style.display="block";

}

}

/* ADMIN */

function openAdmin(){

let pass = prompt(
"🔐 دخل كلمة سر الشيف"
);

if(pass === "0000omar1234"){

let plat =
prompt("🍕 أدخل اسم الطبق");

let prix =
prompt("💰 أدخل السعر");

if(plat && prix){

document.getElementById(
"menu"
).innerHTML =

"🍽️ " + plat +
"<br><br>" +
"💰 السعر : " + prix + " د";

document.getElementById(
"menu"
).style.display="block";

alert(
"✅ تم تحديث قائمة اليوم"
);

}

}

else if(pass !== null){

alert(
"❌ كلمة السر خاطئة"
);

}

}

</script>

</body>
</html>
