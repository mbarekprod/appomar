<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الفنان</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body {
            margin: 0; padding: 20px;
            font-family: 'Cairo', sans-serif;
            background: url('https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            /* Animation Zoom للـ Background */
            animation: zoomBackground 20s infinite alternate ease-in-out;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }

        @keyframes zoomBackground { from { background-size: 100%; } to { background-size: 120%; } }

        .logo-container {
            width: 150px; height: 150px; margin-bottom: 20px;
            border-radius: 50%; border: 3px solid #ffcc33;
            box-shadow: 0 0 20px #ffcc33;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .buttons-cadre {
            background: rgba(0,0,0,0.6); padding: 25px;
            border-radius: 25px; border: 1px solid #ffcc33;
            backdrop-filter: blur(10px); width: 300px;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* Neon Effect للـ buttons */
        .btn {
            padding: 15px; border: 2px solid #ffcc33;
            background: transparent; color: #ffcc33;
            border-radius: 50px; font-weight: bold;
            text-align: center; cursor: pointer;
            transition: 0.4s; text-decoration: none;
            text-shadow: 0 0 5px #ffcc33;
        }
        .btn:hover { 
            background: #ffcc33; color: black;
            box-shadow: 0 0 20px #ffcc33, 0 0 40px #ffcc33;
            transform: scale(1.05); border-color: white;
        }

        /* لوغو المطور */
        .dev-logo {
            margin-top: 30px; width: 120px; opacity: 0.8;
            filter: drop-shadow(0 0 5px #fff);
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://i.ibb.co/svszNHtx/448924350-122100516512380788-8402045732983525719-n.jpg" alt="Logo">
    </div>

    <div class="buttons-cadre">
        <button class="btn" onclick="window.location.href='index.html'">🍽️ قائمة اليوم</button>
        <button class="btn" onclick="window.location.href='wheel.html'">🎡 عجلة الحظ</button>
        <button class="btn" onclick="window.location.href='contact.html'">📞 اتصل بنا</button>
    </div>

    <!-- إشارة للي خدم الـ Application -->
    <img src="699530325_933735136333719_1513047180522368860_n.jpg" class="dev-logo" alt="MBarek Prod">

</body>
</html>
