<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>مطعم الفنان</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Cairo',sans-serif;

background:
linear-gradient(
rgba(0,0,0,.72),
rgba(0,0,0,.72)
),

url('unnamed (2).jpg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow-x:hidden;

padding:30px 15px;
}

/* CONTAINER */

.container{

width:100%;
max-width:400px;

text-align:center;

animation:fade .7s ease;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* LOGO */

.logo{

width:170px;
height:170px;

border-radius:50%;

border:4px solid #ffcc33;

margin:auto;
margin-bottom:20px;

overflow:hidden;

box-shadow:
0 0 20px #ffcc33,
0 0 60px rgba(255,204,51,.6);

animation:pulse 3s infinite;
}

.logo img{

width:100%;
height:100%;

object-fit:cover;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.04);
}

100%{
transform:scale(1);
}

}

/* TITLES */

.title{

font-size:42px;
font-weight:900;

color:#ffcc33;

text-shadow:
0 0 15px rgba(255,204,51,.8);

margin-bottom:8px;
}

.subtitle{

color:white;

font-size:14px;

letter-spacing:2px;

margin-bottom:25px;
}

/* CARD */

.card{

width:100%;

padding:25px;

border-radius:25px;

background:
rgba(0,0,0,.60);

backdrop-filter:blur(8px);

border:2px solid #ffcc33;

box-shadow:
0 0 35px rgba(255,204,51,.25);
}

/* BUTTON */

.btn{

width:100%;

padding:17px;

margin:10px 0;

border:none;

border-radius:15px;

font-size:20px;
font-weight:700;

cursor:pointer;

background:
linear-gradient(
180deg,
#ffcc33,
#e6b800
);

color:black;

transition:.3s;

font-family:'Cairo',sans-serif;

box-shadow:
0 6px 18px rgba(255,204,51,.35);
}

.btn:hover{

transform:scale(1.03);
}

/* MENU */

#menu-wrapper{

display:none;

margin-top:18px;

padding:18px;

border-radius:18px;

background:
rgba(255,255,255,.05);

border:1px solid #ffcc33;

color:white;

font-size:18px;

line-height:2;
}

/* FOOTER */

.footer{

margin-top:25px;

color:white;

font-size:14px;
}

.footer span{

color:#ffcc33;
font-weight:bold;
}

/* SOCIAL */

.social-links{

margin-top:15px;

display:flex;
justify-content:center;
gap:20px;
}

.social-links a{

color:#ffcc33;

font-size:24px;

text-decoration:none;

transition:.3s;
}

.social-links a:hover{

transform:scale(1.2);
}

/* MOBILE */

@media(max-width:500px){

.logo{

width:145px;
height:145px;
}

.title{

font-size:34px;
}

.btn{

font-size:17px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<img src="735043823_122232458936380788_691619389420209673_n (3).jpg">

</div>

<div class="title">

مطعم الفنان

</div>

<div class="subtitle">

Good Food • Good Mood • Good People

</div>

<div class="card">

<button class="btn"
onclick="toggleMenu()">

🍽️ قائمة اليوم

</button>

<button class="btn"
onclick="window.location.href='wheel.html'">

🎡 عجلة الحظ

</button>

<button class="btn"
onclick="window.location.href='contact.html'">

📞 اتصل بنا

</button>

<button class="btn"
onclick="openAdmin()">

👨‍🍳 لوحة الشيف

</button>

<div id="menu-wrapper">

<div id="menu-content">

جاري تحميل القائمة...

</div>

</div>

</div>

<div class="footer">

مطعم الفنان ✨ <br>

بحب من <span>الفنان</span> 🧡

<div class="social-links">

<a href="#">📷</a>

<a href="#">👥</a>

<a href="#">🎵</a>

</div>

</div>

</div>

<script type="module">

import {
doc,
onSnapshot
}

from
"https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

import { db }
from "./firebase.js";

/* MENU */

window.toggleMenu = ()=>{

let menu =
document.getElementById(
"menu-wrapper"
);

menu.style.display =

menu.style.display === "block"

? "none"

: "block";

};

/* ADMIN PASSWORD */

window.openAdmin = ()=>{

let pass = prompt(
"🔐 دخل كلمة سر الشيف"
);

if(pass === "0000omar1234"){

window.location.href =
"admin.html";

}

else if(pass !== null){

alert(
"❌ كلمة السر خاطئة"
);

}

};

/* LOAD MENU */

onSnapshot(

doc(
db,
"menu",
"today"
),

(docSnap)=>{

let content =
document.getElementById(
"menu-content"
);

if(docSnap.exists()){

let d =
docSnap.data();

content.innerHTML = `

🍕 ${d.food1}
— ${d.price1} د

<br><br>

🥘 ${d.food2}
— ${d.price2} د

`;

}

else{

content.innerHTML =
"❌ لا توجد قائمة اليوم";

}

}

);

</script>

</body>
</html>
