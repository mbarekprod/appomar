<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الفنان</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            /* نحينا الـ linear-gradient باش الخلفية تظهر بوضوح تام */
            background: url('https://github.com/mbarekprod/appomar/blob/main/qq.png?raw=true');
            background-size: cover; 
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .logo-container {
            width: 150px; height: 150px; margin-bottom: 20px;
            border-radius: 50%; border: 4px solid #ffcc33;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        .buttons-cadre {
            background: rgba(0, 0, 0, 0.7); /* زدنا في الـ opacity باش يظهر الإطار والأزرار واضحة على الخلفية */
            padding: 30px 20px;
            border: 2px solid #ffcc33;
            border-radius: 20px;
            display: flex; flex-direction: column; align-items: center;
            width: 80%; /* صغرنا العرض متاع الإطار */
            max-width: 300px; /* الإطار ما يفوتش 300px */
            box-sizing: border-box;
        }

        .btn {
            display: block; width: 100%; /* الأزرار تاخذ كامل عرض الإطار المصغر */
            padding: 15px;
            margin: 8px 0;
            background: rgba(255, 204, 51, 0.1); 
            border: 2px solid #ffcc33;
            border-radius: 50px; 
            color: #ffcc33; 
            text-align: center;
            text-decoration: none; 
            font-weight: 700;
            font-size: 18px;
            transition: 0.4s;
        }
        .btn:hover { background: #ffcc33; color: black; cursor: pointer; }

        #menu-wrapper { 
            display: none; width: 80%; max-width: 300px; margin-top: 20px;
            background: rgba(0,0,0,0.9); padding: 15px; 
            border-radius: 15px; border: 1px solid #ffcc33;
            color: #ffcc33; text-align: center;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://i.ibb.co/svszNHtx/448924350-122100516512380788-8402045732983525719-n.jpg" alt="Logo">
    </div>

    <div class="buttons-cadre">
        <button class="btn" onclick="toggleMenu()">🍽️ قائمة اليوم</button>
        <button class="btn" onclick="window.location.href='wheel.html'">🎡 عجلة الحظ</button>
        <button class="btn" onclick="window.location.href='contact.html'">📞 اتصل بنا</button>
        <button class="btn" onclick="openAdmin()">👨‍🍳 لوحة الشيف</button>
    </div>

    <div id="menu-wrapper">
        <div id="menu-content">جاري التحميل...</div>
    </div>

    <script type="module">
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
        import { db } from "./firebase.js";

        window.toggleMenu = () => {
            const m = document.getElementById("menu-wrapper");
            m.style.display = (m.style.display === "block") ? "none" : "block";
        };

        window.openAdmin = () => {
            const pass = prompt("🔐 دخل كلمة سر الشيف:");
            if (pass === "0000omar1234") {
                window.location.href = "admin.html";
            } else if (pass !== null) {
                alert("❌ كلمة السر خاطئة!");
            }
        };

        onSnapshot(doc(db, "menu", "today"), (docSnap) => {
            const content = document.getElementById("menu-content");
            if (docSnap.exists()) {
                const d = docSnap.data();
                content.innerHTML = `🍕 ${d.food1} — ${d.price1} د <br> 🥘 ${d.food2} — ${d.price2} د`;
            }
        });
    </script>
</body>
</html>
