<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الفنان</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body {
            margin: 0; padding: 20px;
            font-family: 'Cairo', sans-serif;
            /* الخلفية ولات اللوغو */
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://i.ibb.co/svszNHtx/448924350-122100516512380788-8402045732983525719-n.jpg');
            background-size: cover; background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .logo-container {
            width: 180px; height: 180px; margin-bottom: 30px;
            border-radius: 50%; border: 5px solid #ffcc33;
            box-shadow: 0 0 20px #ffcc33, 0 0 40px #ffcc33;
            animation: rotateLogo 15s linear infinite;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        /* اللوغو ولى التصويرة متاع الـ Cover */
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes rotateLogo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn {
            width: 280px; padding: 16px; margin: 12px;
            background: rgba(0, 0, 0, 0.6); border: 2px solid #ffcc33;
            border-radius: 30px; color: #ffcc33; text-align: center;
            font-weight: bold; cursor: pointer; transition: 0.4s;
            text-decoration: none; font-size: 18px;
            text-shadow: 0 0 5px #ffcc33;
        }
        .btn:hover { 
            background: #ffcc33; color: black; 
            transform: scale(1.05);
            box-shadow: 0 0 20px #ffcc33;
        }

        #menu-wrapper { 
            display: none; width: 300px; margin-top: 20px;
            background: rgba(0,0,0,0.8); padding: 15px; 
            border-radius: 20px; border: 1px solid #ffcc33;
            color: white; text-align: center;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- هنا التصويرة متاع الـ Cover ولات في اللوغو -->
        <img src="https://i.ibb.co/k2LCR2dN/735043823-122232458936380788-691619389420209673-n.jpg" alt="Logo">
    </div>

    <button class="btn" onclick="toggleMenu()">🍽️ قائمة اليوم</button>
    <button class="btn" onclick="window.location.href='wheel.html'">🎡 عجلة الحظ</button>
    <button class="btn" onclick="window.location.href='contact.html'">📞 اتصل بنا</button>
    <button class="btn" onclick="openAdmin()">👨‍🍳 لوحة الشيف</button>

    <div id="menu-wrapper">
        <div id="menu-content">جاري التحميل...</div>
    </div>

    <script type="module">
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
        import { db } from "./firebase.js";

        window.toggleMenu = () => {
            const m = document.getElementById("menu-wrapper");
            m.style.display = (m.style.display === "block") ? "none" : "block";
        };

        window.openAdmin = () => {
            const pass = prompt("🔐 أدخل كلمة السر:");
            if (pass === "0000omar1234") {
                window.location.href = "admin.html";
            } else if (pass !== null) {
                alert("❌ كلمة سر خاطئة");
            }
        };

        onSnapshot(doc(db, "menu", "today"), (docSnap) => {
            const content = document.getElementById("menu-content");
            if (docSnap.exists()) {
                const d = docSnap.data();
                content.innerHTML = `
                    <div style="font-size:18px;">
                        🍕 ${d.food1} — ${d.price1} د<br>
                        🥘 ${d.food2} — ${d.price2} د
                    </div>`;
            }
        });
    </script>
</body>
</html>
