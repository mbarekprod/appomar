<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مطعم الفنان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Cairo'; padding: 20px; text-align: center; }
        .box { border: 2px solid #f5c842; padding: 20px; border-radius: 20px; margin-bottom: 20px; background: #1a1a1a; }
        input { width: 80%; padding: 10px; margin: 5px; border-radius: 10px; text-align: center; }
        button { background: gold; border: none; padding: 10px 20px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #444; padding: 8px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🍽️ منيو اليوم</h2>
        <div id="menu-list">جاري تحميل المنيو...</div>
    </div>

    <div class="box">
        <h2>👑 قسيمة عجلة الحظ</h2>
        <input type="text" id="cName" placeholder="اسمك الكريم">
        <input type="number" id="cAmount" placeholder="مبلغ الفاتورة (د)">
        <button onclick="submitBill()">🚀 أرسل الفاتورة للتحقق</button>
        <p id="status"></p>
    </div>

    <div class="box">
        <h2>📊 آخر النتائج</h2>
        <table>
            <tr><th>الحريف</th><th>الجائزة</th></tr>
            <tr><td id="res-name">--</td><td id="res-prize">--</td></tr>
        </table>
    </div>

    <script>
        // تحميل المنيو والنتائج
        window.onload = () => {
            const menu = JSON.parse(localStorage.getItem('fananMenu') || '[]');
            document.getElementById('menu-list').innerHTML = menu.map(i => `<p>${i.name} - ${i.price}</p>`).join('');
            
            document.getElementById('res-name').innerText = localStorage.getItem('lastNormalClient') || '--';
            document.getElementById('res-prize').innerText = localStorage.getItem('lastNormalPrize') || '--';
        };

        // نظام الـ VIP
        function submitBill() {
            const name = document.getElementById('cName').value;
            const amount = document.getElementById('cAmount').value;
            localStorage.setItem('pendingClient', JSON.stringify({name, amount}));
            localStorage.setItem('vipTriggered', 'false');
            document.getElementById('status').innerText = "⏳ انتظر موافقة الشيف...";
            
            let check = setInterval(() => {
                if(localStorage.getItem('vipTriggered') === 'true') {
                    clearInterval(check);
                    window.location.href = "wheel.html";
                }
            }, 2000);
        }
    </script>
</body>
</html>
