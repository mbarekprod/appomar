<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مطعم الفنان</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Cairo,sans-serif;background:linear-gradient(rgba(0,0,0,.72),rgba(0,0,0,.72)),url('unnamed (2).jpg') center/cover fixed;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:30px 15px;color:#fff}
#intro{position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center;z-index:99999;transition:1s}
#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
transition:opacity 1s;
}

#introImage{
width:100%;
height:100%;
object-fit:cover;
animation:introAnim 4s ease forwards;
}

@keyframes introAnim{
0%{opacity:0;transform:scale(1.08);}
20%{opacity:1;transform:scale(1);}
80%{opacity:1;transform:scale(1);}
100%{opacity:0;transform:scale(.96);}
}
.container{width:100%;max-width:400px;text-align:center}
.logo{width:170px;height:170px;border-radius:50%;border:4px solid #ffcc33;margin:0 auto 20px;overflow:hidden}.logo img{width:100%;height:100%;object-fit:cover}
.title{font-size:42px;color:#ffcc33;font-weight:900}.subtitle{margin:10px 0 25px}
.card{background:rgba(0,0,0,.6);padding:25px;border:2px solid #ffcc33;border-radius:25px}
.btn{display:block;width:100%;padding:16px;margin:10px 0;border:none;border-radius:15px;background:#ffcc33;font:700 20px Cairo,sans-serif;cursor:pointer}
#menu-wrapper{display:none;margin-top:15px;padding:15px;border:1px solid #ffcc33;border-radius:15px}
</style>
</head>
<body>
  <div id="intro">
    <img src="by fanen.png" id="introImage" alt="By Fanen">
</div>
<div id="intro">
<audio id="introMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>
<video autoplay muted loop playsinline><source src="intro.mp4" type="video/mp4"></video>
<div class="intro-overlay">
<img class="intro-logo" src="735043823_122232458936380788_691619389420209673_n (3).jpg">
<h1>مطعم الفنان</h1>
<p id="introText">🍕 أهلاً وسهلاً بكم</p>
<button id="playMusic">🎵 تشغيل الموسيقى</button>
<button id="skipIntro">تخطي</button>
</div></div>

<div class="container">
<div class="logo"><img src="735043823_122232458936380788_691619389420209673_n (3).jpg"></div>
<div class="title">مطعم الفنان</div>
<div class="subtitle">Good Food • Good Mood • Good People</div>
<div class="card">
<button class="btn" onclick="toggleMenu()">🍽️ قائمة اليوم</button>
<button class="btn" onclick="location.href='menu.html'">📋 المنيو الكامل</button>
<button class="btn" onclick="location.href='wheel.html'">🎡 عجلة الحظ</button>
<button class="btn" onclick="location.href='contact.html'">📞 اتصل بنا</button>
<button class="btn" onclick="location.href='cv.html'">👨‍🍳 CV الشيف</button>
<button class="btn" onclick="window.open('https://maps.app.goo.gl/tZCRQV84MwNQhEZg9')">📍 موقع المطعم</button>
<button class="btn" onclick="openAdmin()">👨‍🍳 لوحة الشيف</button>
<div id="menu-wrapper"><div id="menu-content">جاري تحميل القائمة...</div></div>
</div></div>

<script>
function toggleMenu(){const m=document.getElementById('menu-wrapper');m.style.display=m.style.display==='block'?'none':'block';}
function openAdmin(){const p=prompt('🔐 دخل كلمة سر الشيف');if(p==='0000omar1234')location.href='admin.html';else if(p!==null)alert('❌ كلمة السر خاطئة');}
const intro=document.getElementById('intro'),music=document.getElementById('introMusic'),play=document.getElementById('playMusic');
const texts=["🍕 أشهى أنواع البيتزا","🥪 سندويتشات بطعم لا يقاوم","🍟 جودة... سرعة... نظافة","❤️ أهلاً وسهلاً بكم في مطعم الفنان"];
let i=0;setInterval(()=>{i=(i+1)%texts.length;document.getElementById('introText').textContent=texts[i];},2000);
window.addEventListener('load',()=>{music.volume=.25;music.play().then(()=>play.style.display='none').catch(()=>{});});
play.onclick=()=>{music.play();play.style.display='none';};
document.getElementById('skipIntro').onclick=()=>{intro.style.opacity='0';setTimeout(()=>intro.remove(),600);music.pause();};
setTimeout(()=>{if(document.body.contains(intro)){intro.style.opacity='0';setTimeout(()=>intro.remove(),1000)}},6000);
</script>
</body></html>
