<section id="menu" class="section hidden">

```
<h2>🍽️ قائمة اليوم</h2>

<div id="dynamic-menu"></div>
```

</section>

<script type="module">

import {
    doc,
    onSnapshot,
    getDoc

} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

import {
    getMessaging,
    getToken

} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-messaging.js";

import { db } from "./firebase.js";



// ========================================
// تحديث المنيو لحظة بلحظة
// ========================================

const menuRef = doc(db, "menu", "today");

onSnapshot(menuRef, (docSnap) => {

    if (docSnap.exists()) {

        const data = docSnap.data();

        document.getElementById('dynamic-menu').innerHTML = `

            <div class="menu-item">
                <span>🍕 ${data.food1 || '---'}</span>
                <strong>${data.price1 || '---'} د</strong>
            </div>

            <div class="menu-item">
                <span>🥘 ${data.food2 || '---'}</span>
                <strong>${data.price2 || '---'} د</strong>
            </div>

        `;
    }
});



// ========================================
// تفعيل الإشعارات
// ========================================

const messaging = getMessaging();

const vapidKey =
'BLAh8sVDM-cX5y4GpVLwwfQiyTi94CwuH5AYIILf5xLD9qxPqZdJDLiOdo148bo9D96ao7PFPAopBcRuG2vWcuU';


Notification.requestPermission().then((permission) => {

    if (permission === 'granted') {

        getToken(messaging, {

            vapidKey: vapidKey

        }).then((token) => {

            console.log("تم تسجيل الجهاز بنجاح!");

        });
    }
});



// ========================================
// كود تحميل التطبيق PWA
// ========================================

let deferredPrompt;

const installBtn =
document.getElementById('install-btn');


window.addEventListener('beforeinstallprompt', (e) => {

    e.preventDefault();

    deferredPrompt = e;

    installBtn.style.display = 'block';
});


installBtn.addEventListener('click', () => {

    deferredPrompt.prompt();

    deferredPrompt.userChoice.then((choiceResult) => {

        if (choiceResult.outcome === 'accepted') {

            installBtn.style.display = 'none';
        }

        deferredPrompt = null;
    });
});



// ========================================
// التحقق من توقيت عجلة الحظ
// ========================================
async function checkWheelTime() {

```
const settingsRef =
doc(db, "wheel_settings", "config");

const settingsSnap =
await getDoc(settingsRef);

// إذا ما فماش إعدادات تخدم عادي
if (!settingsSnap.exists()) {

    return true;
}

const settings = settingsSnap.data();

// إذا البداية أو النهاية فارغين
if (!settings.startHour || !settings.endHour) {

    return true;
}


// الوقت الحالي
const now = new Date();

const currentHour = now.getHours();
const currentMinute = now.getMinutes();

const currentTotal =
    (currentHour * 60) + currentMinute;


// وقت البداية
const startParts =
    settings.startHour.split(":");

const startHour =
    parseInt(startParts[0]);

const startMinute =
    parseInt(startParts[1]);

const startTotal =
    (startHour * 60) + startMinute;


// وقت النهاية
const endParts =
    settings.endHour.split(":");

const endHour =
    parseInt(endParts[0]);

const endMinute =
    parseInt(endParts[1]);

const endTotal =
    (endHour * 60) + endMinute;


console.log("الوقت الحالي:", currentTotal);
console.log("البداية:", startTotal);
console.log("النهاية:", endTotal);


// التحقق
if (
    currentTotal >= startTotal &&
    currentTotal <= endTotal
) {

    return true;
}

return false;
```

}

// ========================================
// زر عجلة الحظ
// ========================================

const wheelBtn =
document.getElementById("wheel-btn");


wheelBtn.addEventListener("click", async () => {

    const canOpen =
    await checkWheelTime();


    if (!canOpen) {

        alert("⛔ عجلة الحظ مسكرة حاليا");

        return;
    }


    window.location.href = "wheel.html";

});

</script>

<script src="script.js"></script>
