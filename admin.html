</div>

<script type="module">

import {
    doc,
    setDoc,
    collection,
    onSnapshot,
    query,
    orderBy

} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

import { db } from "./firebase.js";


window.saveMenu = async function () {

    await setDoc(doc(db, "menu", "today"), {

        food1: document.getElementById("food1").value,
        price1: document.getElementById("price1").value,

        food2: document.getElementById("food2").value,
        price2: document.getElementById("price2").value

    });

    alert("✅ تم تحديث المنيو!");
};



// حفظ توقيت بداية ونهاية عجلة الحظ
window.saveHappyHour = async function () {

    const start = document.getElementById("startHour").value;
    const end = document.getElementById("endHour").value;

    if (!start || !end) {

        alert("⚠️ حدد وقت البداية والنهاية");
        return;
    }

    await setDoc(

        doc(db, "wheel_settings", "config"),

        {
            startHour: start,
            endHour: end
        },

        { merge: true }

    );

    alert("✅ تم ضبط توقيت العجلة من " + start + " إلى " + end);
};



// فتح Firebase Notifications
window.openNotificationPanel = function () {

    window.open(
        'https://console.firebase.google.com/project/base-resto-3d1e8/notification',
        '_blank'
    );
};



// تحميل النتائج مباشرة
function loadData() {

    const q = query(
        collection(db, "prizes"),
        orderBy("time", "desc")
    );

    onSnapshot(q, (snapshot) => {

        const tbody = document.getElementById('wheel-results-body');

        tbody.innerHTML = "";

        snapshot.forEach((docSnap) => {

            const res = docSnap.data();

            tbody.innerHTML += `
                <tr>
                    <td>${res.time}</td>
                    <td style="color:gold; font-weight:bold;">
                        ${res.prize}
                    </td>
                </tr>
            `;
        });
    });
}

loadData();

</script>
