<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة الشيف - الفنان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Cairo", Arial, sans-serif;
      background: linear-gradient(160deg, #1a0a00 0%, #2d1200 60%, #1a0a00 100%);
      color: white;
      text-align: center;
      padding: 30px;
      min-height: 100vh;
    }

    h2 {
      color: #f5c842;
      font-weight: 900;
    }

    input, button {
      padding: 12px;
      margin: 10px 5px;
      border-radius: 8px;
      border: none;
      font-family: "Cairo", sans-serif;
    }

    input {
      background: #331a00;
      color: white;
      border: 1px solid #f5c842;
      text-align: center;
    }

    button {
      background: linear-gradient(135deg, #f5c842, #d89b00);
      color: #1a0a00;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    table {
      margin: 30px auto;
      width: 90%;
      max-width: 600px;
      border-collapse: collapse;
      box-shadow: 0 0 20px rgba(245, 200, 66, 0.15);
      background: rgba(0, 0, 0, 0.4);
    }

    th, td {
      border: 1px solid #443322;
      padding: 12px;
      text-align: center;
    }

    th {
      background: #f5c842;
      color: #1a0a00;
      font-weight: 900;
    }

    td {
      color: #fff;
    }
    
    tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>

<h2>🔐 لوحة تحكم الشيف</h2>

<div id="loginBox">
  <input type="password" id="pass" placeholder="أدخل كلمة السر">
  <button onclick="login()">دخول</button>
</div>

<div id="panel" style="display:none;">
  <h2>🎡 نتائج عجلة الحظ المباشرة</h2>
  <table>
    <thead>
      <tr>
        <th>الجائزة</th>
        <th>التاريخ والوقت</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyClwbk9bCyY5YZO5jBMbjo4IWCqGfYcDCw",
    authDomain: "base-resto-3d1e8.firebaseapp.com",
    projectId: "base-resto-3d1e8",
    storageBucket: "base-resto-3d1e8.firebasestorage.app",
    messagingSenderId: "797391462536",
    appId: "1:797391462536:web:631a9149d7e2b33d137f3d",
    measurementId: "G-3H35HSFQ7S"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = function () {
  const pass = document.getElementById("pass").value;

  if (pass === "1234") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
    loadData();
  } else {
    alert("❌ كلمة السر غالطة يا شيف!");
  }
};

function loadData() {
  const tbody = document.getElementById("data");
  
  // نقرأ من الـ collection اللي اسمها prizes وجلب البيانات المحدثة
  const q = collection(db, "prizes");

  onSnapshot(q, (snapshot) => {
    tbody.innerHTML = "";

    snapshot.forEach((doc) => {
      const d = doc.data();

      tbody.innerHTML += `
        <tr>
          <td style="font-size: 18px; font-weight: bold;">${d.prize}</td>
          <td style="color: #c8a96e;">${d.date || '---'}</td>
        </tr>
      `;
    });
    
    if(snapshot.empty) {
      tbody.innerHTML = "<tr><td colspan='2'>لا توجد جوائز مسجلة بعد.</td></tr>";
    }
  });
}
</script>

</body>
</html>
