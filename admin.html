<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>لوحة تحكم الشيف 🔐</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #1a0a00;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .box {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #f5c842;
            max-width: 420px;
            margin: 20px auto;
        }

        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-family: 'Cairo';
            text-align: center;
            font-size: 16px;
            color: #000;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        button {
            background: linear-gradient(135deg, #ff9800, #e65100);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-size: 16px;
        }

        .notify-btn {
            background: linear-gradient(135deg, #2196f3, #0d47a1);
        }

        .lucky-btn {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
        }

        .event-btn {
            background: linear-gradient(135deg, #9c27b0, #4a148c);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            color: white;
        }

        th, td {
            padding: 8px;
            border: 1px solid #444;
            text-align: center;
        }

        .event-card {
            background: rgba(255,255,255,0.07);
            border: 1px solid #9c27b0;
            border-radius: 10px;
            padding: 10px;
            margin: 10px 0;
            text-align: right;
            position: relative;
        }

        .event-card h4 {
            margin: 0 0 5px 0;
            color: #f5c842;
        }

        .event-card p {
            margin: 3px 0;
            font-size: 14px;
        }

        .delete-event-btn {
            background: #d32f2f;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 15px;
            font-size: 13px;
            width: auto;
            margin-top: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <audio id="bgMusic" loop>
        <source src="sanfara.mp3" type="audio/mpeg">
    </audio>

<div id="content">

    <h1>👨‍🍳 لوحة تحكم الشيف الفنان</h1>

    <div class="box">
        <h3>🍽️ تحديث قائمة اليوم</h3>

        <input type="text" id="food1" placeholder="أكلة 1">
        <input type="text" id="price1" placeholder="السوم">

        <input type="text" id="food2" placeholder="أكلة 2">
        <input type="text" id="price2" placeholder="السوم">

        <button onclick="saveMenu()">🚀 تحديث المنيو</button>

        <button class="notify-btn" onclick="openNotificationPanel()">
            📢 إرسال إشعار للزبائن
        </button>
    </div>

    <div class="box">
        <h3>🎡 توقيت عمل عجلة الحظ</h3>

        <input type="time" id="startHour">
        <input type="time" id="endHour">

        <button class="lucky-btn" onclick="saveHappyHour()">
            ⏰ حفظ توقيت العجلة
        </button>
    </div>

    <!-- ===================== قسم الإيفينمونات الجديد ===================== -->
    <div class="box">
        <h3>🎉 إضافة إيفينمون جديد</h3>

        <input type="text" id="eventTitle" placeholder="عنوان الإيفينمون (مثال: سهرة أورجانتينو)">
        <textarea id="eventDesc" placeholder="تفاصيل الإيفينمون"></textarea>

        <input type="date" id="eventDate">
        <input type="time" id="eventTime">

        <input type="text" id="eventImage" placeholder="رابط صورة (اختياري)">

        <button class="event-btn" onclick="addEvent()">
            ✨ نشر الإيفينمون
        </button>
    </div>

    <div class="box">
        <h3>📅 الإيفينمونات المنشورة</h3>
        <div id="events-list">
            <p>جارِ تحميل البيانات...</p>
        </div>
    </div>

    <div class="box">
        <h3>📊 سجل نتائج العجلات (مباشر)</h3>

        <table>
            <thead>
                <tr>
                    <th>الوقت</th>
                    <th>النتيجة</th>
                </tr>
            </thead>

            <tbody id="wheel-results-body">
                <tr>
                    <td colspan="2">جارِ تحميل البيانات...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <a href="index.html" style="color:gold;">
        ⬅️ رجوع للموقع
    </a>
</div>

<script type="module">

import {
    doc,
    setDoc,
    addDoc,
    deleteDoc,
    collection,
    onSnapshot,
    query,
    orderBy

} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

import { db } from "./firebase.js";


window.saveMenu = async function () {

    await setDoc(doc(db, "menu", "today"), {

        food1: document.getElementById("food1").value,
        price1: document.getElementById("price1").value,

        food2: document.getElementById("food2").value,
        price2: document.getElementById("price2").value

    });

    alert("✅ تم تحديث المنيو!");
};



// حفظ توقيت بداية ونهاية عجلة الحظ
window.saveHappyHour = async function () {

    const start = document.getElementById("startHour").value;
    const end = document.getElementById("endHour").value;

    if (!start || !end) {

        alert("⚠️ حدد وقت البداية والنهاية");
        return;
    }

    await setDoc(

        doc(db, "wheel_settings", "config"),

        {
            startHour: start,
            endHour: end
        },

        { merge: true }

    );

    alert("✅ تم ضبط توقيت العجلة من " + start + " إلى " + end);
};



// فتح Firebase Notifications
window.openNotificationPanel = function () {

    window.open(
        'https://console.firebase.google.com/project/base-resto-3d1e8/notification',
        '_blank'
    );
};



// ===================== إضافة إيفينمون =====================
window.addEvent = async function () {

    const title = document.getElementById("eventTitle").value.trim();
    const desc  = document.getElementById("eventDesc").value.trim();
    const date  = document.getElementById("eventDate").value;
    const time  = document.getElementById("eventTime").value;
    const image = document.getElementById("eventImage").value.trim();

    if (!title || !date) {
        alert("⚠️ لازم تحط عنوان وتاريخ للإيفينمون");
        return;
    }

    await addDoc(collection(db, "events"), {
        title: title,
        description: desc,
        date: date,
        time: time,
        image: image,
        createdAt: Date.now()
    });

    // فراغ الحقول بعد النشر
    document.getElementById("eventTitle").value = "";
    document.getElementById("eventDesc").value = "";
    document.getElementById("eventDate").value = "";
    document.getElementById("eventTime").value = "";
    document.getElementById("eventImage").value = "";

    alert("✅ تم نشر الإيفينمون!");
};


// حذف إيفينمون
window.deleteEvent = async function (id) {
    if (!confirm("متأكد تحب تحذف هاد الإيفينمون؟")) return;
    await deleteDoc(doc(db, "events", id));
};


// تحميل الإيفينمونات مباشرة فالوحة الأدمين
function loadEvents() {

    const q = query(
        collection(db, "events"),
        orderBy("date", "asc")
    );

    onSnapshot(q, (snapshot) => {

        const list = document.getElementById("events-list");

        if (snapshot.empty) {
            list.innerHTML = "<p>مفماش إيفينمونات حالياً</p>";
            return;
        }

        list.innerHTML = "";

        snapshot.forEach((docSnap) => {

            const ev = docSnap.data();

            list.innerHTML += `
                <div class="event-card">
                    ${ev.image ? `<img src="${ev.image}" style="width:100%;border-radius:8px;margin-bottom:8px;">` : ""}
                    <h4>${ev.title}</h4>
                    <p>${ev.description || ""}</p>
                    <p>📅 ${ev.date} ${ev.time ? " - ⏰ " + ev.time : ""}</p>
                    <button class="delete-event-btn" onclick="deleteEvent('${docSnap.id}')">🗑️ حذف</button>
                </div>
            `;
        });
    });
}

loadEvents();


// تحميل النتائج مباشرة
function loadData() {

    const q = query(
        collection(db, "prizes"),
        orderBy("time", "desc")
    );

    onSnapshot(q, (snapshot) => {

        const tbody = document.getElementById('wheel-results-body');

        tbody.innerHTML = "";

        snapshot.forEach((docSnap) => {

            const res = docSnap.data();

            tbody.innerHTML += `
                <tr>
                    <td>${res.time}</td>
                    <td style="color:gold; font-weight:bold;">
                        ${res.prize}
                    </td>
                </tr>
            `;
        });
    });
}

loadData();

</script>

<script>
const music = document.getElementById("bgMusic");
music.volume = 0.5;

function applySavedTime(){
    try{
        const savedTime = localStorage.getItem("musicTime");
        if (savedTime && music.readyState > 0) {
            music.currentTime = parseFloat(savedTime);
        }
    } catch(e){}
}

if (music.readyState > 0) {
    applySavedTime();
} else {
    music.addEventListener("loadedmetadata", applySavedTime);
}

setInterval(() => {
    try { localStorage.setItem("musicTime", music.currentTime); } catch(e){}
}, 1000);

try {
    const muted = localStorage.getItem("musicMuted");
    if (muted === "true") { music.muted = true; }
} catch(e){}

function startMusic() {
    music.play().catch(() => {});
}

window.addEventListener("load", startMusic);
startMusic();

function unlockOnce() {
    startMusic();
    document.removeEventListener("click", unlockOnce);
    document.removeEventListener("touchstart", unlockOnce);
    document.removeEventListener("scroll", unlockOnce);
    document.removeEventListener("keydown", unlockOnce);
}

document.addEventListener("click", unlockOnce);
document.addEventListener("touchstart", unlockOnce);
document.addEventListener("scroll", unlockOnce);
document.addEventListener("keydown", unlockOnce);
</script>

</body>
</html>
