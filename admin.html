<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة الشيف المباشرة - الفنان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: "Cairo", sans-serif; background: linear-gradient(160deg, #1a0a00 0%, #2d1200 60%, #1a0a00 100%); color: white; text-align: center; padding: 25px; min-height: 100vh; }
    h2, h3 { color: #f5c842; font-weight: 900; margin-bottom: 15px; }
    input, button { padding: 12px; margin: 10px 5px; border-radius: 8px; border: none; font-family: "Cairo", sans-serif; text-align: center; }
    input { background: #331a00; color: white; border: 1px solid #f5c842; }
    button { background: linear-gradient(135deg, #f5c842, #d89b00); color: #1a0a00; font-weight: bold; cursor: pointer; }
    
    .section-box { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 12px; border: 1px solid #443322; max-width: 700px; margin: 20px auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #443322; padding: 12px; text-align: center; }
    th { background: #f5c842; color: #1a0a00; font-weight: 900; }
    
    .vip-btn { background: #4caf50; color: white; padding: 6px 15px; border-radius: 5px; font-size: 14px; border: none; cursor: pointer; font-family: "Cairo"; font-weight: bold;}
    .status-badge { background: #ff9800; color: black; padding: 3px 8px; border-radius: 4px; font-size: 13px; font-weight: bold; }
    .status-vip { background: #4caf50; color: white; }
  </style>
</head>
<body>

<h2>🔐 لوحة تحكم الشيف السرية</h2>

<div id="loginBox">
  <input type="password" id="pass" placeholder="أدخل كلمة سر الشيف">
  <button onclick="login()">دخول للوحة</button>
</div>

<div id="panel" style="display:none;">
  
  <div class="section-box" style="border-color: #4caf50;">
    <h3>👑 طلبات تفعيل عجلة VIP حسب الاسم:</h3>
    <table>
      <thead>
        <tr>
          <th>اسم الحريف</th>
          <th>وقت الدخول</th>
          <th>الحالة الحالية</th>
          <th>التحكم</th>
        </tr>
      </thead>
      <tbody id="activeTablesData">
        <tr><td colspan="4">في انتظار دخول أي حريف...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="section-box">
    <h3>🎡 سجل الجوائز الممنوحة للزبائن:</h3>
    <table>
      <thead>
        <tr>
          <th>الجائزة والنوع</th>
          <th>تفاصيل الحريف والوقت</th>
        </tr>
      </thead>
      <tbody id="prizesData"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyClwbk9bCyY5YZO5jBMbjo4IWCqGfYcDCw",
    authDomain: "base-resto-3d1e8.firebaseapp.com",
    projectId: "base-resto-3d1e8",
    storageBucket: "base-resto-3d1e8.firebasestorage.app",
    messagingSenderId: "797391462536",
    appId: "1:797391462536:web:631a9149d7e2b33d137f3d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = function () {
  if (document.getElementById("pass").value === "1234") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
    startLiveSync();
  } else { alert("❌ كلمة السر غالطة!"); }
};

// دالة تفعيل الـ VIP للحريف بكبسة زر
window.activateVIPTable = async function(clientDocId) {
    try {
        await updateDoc(doc(db, "active_sessions", clientDocId), { status: "VIP" });
        console.log("🚀 تم إرسال إشارة الـ VIP للحريف!");
    } catch(e) { console.error(e); }
}

function startLiveSync() {
  // 1. مراقبة الحرفاء المتصلين لايف بالاسم
  onSnapshot(collection(db, "active_sessions"), (snapshot) => {
    const tbody = document.getElementById("activeTablesData");
    tbody.innerHTML = "";
    
    snapshot.forEach((docSnap) => {
      const d = docSnap.data();
      const isVIP = d.status === "VIP";
      
      tbody.innerHTML += `
        <tr>
          <td><strong style="color: #f5c842; font-size: 16px;">👤 ${d.name}</strong></td>
          <td style="color: #c8a96e;">${d.time || '---'}</td>
          <td><span class="status-badge ${isVIP ? 'status-vip':''}">${isVIP ? 'مفعّلة VIP 👑':'ينتظر ⏳'}</span></td>
          <td>
            ${isVIP ? '✔️ تم التفعيل' : `<button class="vip-btn" onclick="activateVIPTable('${docSnap.id}')">👑 تفعيل الـ VIP</button>`}
          </td>
        </tr>
      `;
    });
    if(snapshot.empty) tbody.innerHTML = "<tr><td colspan='4'>لا يوجد زبائن نشطين حالياً.</td></tr>";
  });

  // 2. مراقبة سجل الجوائز والنتائج
  onSnapshot(collection(db, "prizes"), (snapshot) => {
    const tbody = document.getElementById("prizesData");
    tbody.innerHTML = "";
    snapshot.forEach((docSnap) => {
      const d = docSnap.data();
      tbody.innerHTML += `<tr><td><strong>${d.prize}</strong></td><td style="color: #c8a96e;">${d.date}</td></tr>`;
    });
    if(snapshot.empty) tbody.innerHTML = "<tr><td colspan='2'>لا توجد جوائز مسجلة بعد.</td></tr>";
  });
}
</script>

</body>
</html>
