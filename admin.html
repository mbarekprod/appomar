<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الشيف 🔐</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #1a0a00; color: white; padding: 20px; text-align: center; }
        .box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid #f5c842; max-width: 420px; margin: 20px auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 10px; border: 1px solid #ccc; font-family: 'Cairo'; text-align: center; font-size: 16px; color: #000; }
        button { background: linear-gradient(135deg, #ff9800, #e65100); color: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: white; }
        th, td { padding: 8px; border: 1px solid #444; text-align: center; }
    </style>
</head>
<body>

<div id="content" style="display:none;">
    <h1>👨‍🍳 لوحة تحكم الشيف الفنان</h1>
    
    <div class="box">
        <h3>🍽️ تحديث قائمة اليوم</h3>
        <input type="text" id="food1" placeholder="أكلة 1">
        <input type="text" id="price1" placeholder="السوم">
        <input type="text" id="food2" placeholder="أكلة 2">
        <input type="text" id="price2" placeholder="السوم">
        <button onclick="saveMenu()">🚀 تحديث المنيو</button>
    </div>

    <div class="box">
        <h3>📊 نتائج العجلات</h3>
        <table>
            <thead>
                <tr><th>النوع</th><th>النتيجة</th></tr>
            </thead>
            <tbody id="wheel-results-body">
                <tr><td colspan="2">انتظار النتائج...</td></tr>
            </tbody>
        </table>
        <button onclick="clearResults()" style="background:red;">🗑️ فسخ النتائج</button>
    </div>
    <a href="index.html" style="color:gold;">⬅️ رجوع للموقع</a>
</div>
    <div class="box">
    <h3>⏰ ضبط توقيت العجلة</h3>
    من: <input type="time" id="startTime" value="17:00">
    إلى: <input type="time" id="endTime" value="18:00">
    <button onclick="saveTime()">💾 حفظ التوقيت</button>
</div>

<script>
    function saveTime() {
        localStorage.setItem('wheelStart', document.getElementById('startTime').value);
        localStorage.setItem('wheelEnd', document.getElementById('endTime').value);
        alert('✅ تم ضبط التوقيت!');
    }
</script>

<script>
    // 1. القفيلة (الباسورد)
    function checkPass() {
        let p = prompt("🔐 أدخل كلمة سر الشيف:");
        if (p === "1234") {
            document.getElementById('content').style.display = 'block';
            loadData();
        } else {
            alert("خطأ في كلمة السر!");
            window.location.href = "index.html";
        }
    }
    
    // 2. حفظ المنيو
    function saveMenu() {
        const data = [
            { name: document.getElementById('food1').value, price: document.getElementById('price1').value },
            { name: document.getElementById('food2').value, price: document.getElementById('price2').value }
        ];
        localStorage.setItem('fananMenu', JSON.stringify(data));
        alert('✅ تم تحديث المنيو!');
    }

    // 3. عرض النتائج من العجلة
    function loadData() {
        // قراءة النتيجة من العجلة (تأكد أن صفحة العجلة تحفظ في 'lastResult')
        const result = JSON.parse(localStorage.getItem('lastResult'));
        const tbody = document.getElementById('wheel-results-body');
        
        if (result) {
            tbody.innerHTML = `<tr><td>العجلة 🎡</td><td style="color: gold;">${result.prize}</td></tr>`;
        } else {
            tbody.innerHTML = `<tr><td colspan="2">لم يتم تدوير العجلة بعد</td></tr>`;
        }
    }

    function clearResults() {
        localStorage.removeItem('lastResult');
        loadData();
    }

    // تشغيل القفيلة عند فتح الصفحة
    checkPass();
    
    // تحديث النتائج كل 3 ثواني
    setInterval(loadData, 3000);
</script>

</body>
</html>4
