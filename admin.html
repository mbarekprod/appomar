<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الشيف 🔐</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #1a0a00; color: white; padding: 20px; text-align: center; }
        .box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid #f5c842; max-width: 420px; margin: 20px auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 10px; border: 1px solid #ccc; font-family: 'Cairo'; text-align: center; font-size: 16px; color: #000; }
        button { background: linear-gradient(135deg, #ff9800, #e65100); color: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: white; }
        th, td { padding: 8px; border: 1px solid #444; text-align: center; }
    </style>
</head>
<body>

<div id="content" style="display:none;">
    <h1>👨‍🍳 لوحة تحكم الشيف الفنان</h1>
    
    <div class="box">
        <h3>🍽️ تحديث قائمة اليوم</h3>
        <input type="text" id="food1" placeholder="أكلة 1">
        <input type="text" id="price1" placeholder="السوم">
        <input type="text" id="food2" placeholder="أكلة 2">
        <input type="text" id="price2" placeholder="السوم">
        <button onclick="saveMenu()">🚀 تحديث المنيو</button>
    </div>

    <div class="box">
        <h3>⏰ ضبط توقيت العجلة</h3>
        من: <input type="time" id="startTime">
        إلى: <input type="time" id="endTime">
        <button onclick="saveTime()">💾 حفظ التوقيت</button>
    </div>

    <div class="box">
        <h3>📊 سجل نتائج العجلات</h3>
        <table>
            <thead>
                <tr><th>الوقت</th><th>النتيجة</th></tr>
            </thead>
            <tbody id="wheel-results-body">
                <tr><td colspan="2">انتظار النتائج...</td></tr>
            </tbody>
        </table>
        <button onclick="clearResults()" style="background:red;">🗑️ فسخ الأرشيف</button>
    </div>
    <a href="index.html" style="color:gold;">⬅️ رجوع للموقع</a>
</div>

<script>
<script>

function checkPass() {

    const BLOCK_TIME = 70 * 60 * 60 * 1000;
    const MAX_TRIES = 3;

    let blockedUntil = localStorage.getItem('chefBlockedUntil');

    if (blockedUntil && Date.now() < parseInt(blockedUntil)) {
        alert("⛔ تم حظر الدخول مؤقتاً.");
        window.location.href = "index.html";
        return;
    }

    let tries = parseInt(localStorage.getItem('chefTries') || "0");

    let p = prompt("🔐 أدخل كلمة سر الشيف:");

    if (p === "1234") {

        localStorage.removeItem('chefTries');
        localStorage.removeItem('chefBlockedUntil');

        document.getElementById('content').style.display = 'block';

        loadData();

        document.getElementById('startTime').value =
            localStorage.getItem('wheelStart') || "17:00";

        document.getElementById('endTime').value =
            localStorage.getItem('wheelEnd') || "18:00";

    } else {

        tries++;
        localStorage.setItem('chefTries', tries);

        if (tries >= MAX_TRIES) {

            localStorage.setItem(
                'chefBlockedUntil',
                Date.now() + BLOCK_TIME
            );

            alert("🚫 تم حظر الدخول لمدة 70 ساعة.");

        } else {

            alert(`❌ كلمة سر خاطئة. بقي ${MAX_TRIES - tries} محاولة`);

        }

        window.location.href = "index.html";
    }
}

// حفظ توقيت العجلة
function saveTime() {

    localStorage.setItem(
        'wheelStart',
        document.getElementById('startTime').value
    );

    localStorage.setItem(
        'wheelEnd',
        document.getElementById('endTime').value
    );

    alert('✅ تم حفظ التوقيت!');
}

// عرض نتائج العجلة
function loadData() {

    const history =
        JSON.parse(localStorage.getItem('allResults') || "[]");

    const tbody =
        document.getElementById('wheel-results-body');

    if (history.length === 0) {

        tbody.innerHTML =
            '<tr><td colspan="2">لا توجد نتائج حالياً</td></tr>';

        return;
    }

    tbody.innerHTML = "";

    [...history].reverse().forEach(res => {

        tbody.innerHTML += `
            <tr>
                <td>${res.time}</td>
                <td style="color:gold;font-weight:bold;">
                    ${res.prize}
                </td>
            </tr>
        `;
    });
}

// مسح الأرشيف
function clearResults() {

    if (!confirm("هل تريد فعلاً حذف جميع النتائج؟")) {
        return;
    }

    localStorage.removeItem('allResults');

    loadData();

    alert("🗑️ تم مسح السجل!");
}

// حفظ المنيو
function saveMenu() {

    const data = [

        {
            name: document.getElementById('food1').value,
            price: document.getElementById('price1').value
        },

        {
            name: document.getElementById('food2').value,
            price: document.getElementById('price2').value
        }

    ];

    localStorage.setItem(
        'fananMenu',
        JSON.stringify(data)
    );

    alert('✅ تم تحديث المنيو!');
}

// تشغيل النظام
checkPass();

setInterval(loadData, 3000);

</script>
</script>

</body>
</html>
