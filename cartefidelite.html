<!DOCTYPE html>
<html lang="fr">
<head>
  <!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carte Fidélité</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(0,0,0,.85),rgba(0,0,0,.85)),
url("unnamed (2).jpg");

background-size:cover;
background-position:center;

overflow:hidden;

}

.card{

width:370px;
max-width:92%;

background:rgba(20,20,20,.75);

backdrop-filter:blur(12px);

border:2px solid #d4af37;

border-radius:25px;

padding:30px;

box-shadow:
0 0 35px rgba(212,175,55,.35);

animation:up .8s ease;

}

@keyframes up{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.logo{

width:110px;
height:110px;

margin:auto;

border-radius:50%;

overflow:hidden;

border:4px solid gold;

box-shadow:0 0 20px gold;

}

.logo img{

width:100%;
height:100%;
object-fit:cover;

}

.title{

text-align:center;

color:#FFD700;

font-size:30px;

font-weight:900;

margin-top:18px;

}

.line{

height:2px;

background:linear-gradient(to right,transparent,gold,transparent);

margin:20px 0;

}

.info{

color:white;

font-size:18px;

margin:12px 0;

}

.info span{

color:#FFD700;

font-weight:bold;

}

.stars{

display:grid;

grid-template-columns:repeat(5,1fr);

gap:12px;

margin-top:25px;

}

.star{

height:55px;

display:flex;

justify-content:center;
align-items:center;

border-radius:15px;

background:#2b2b2b;

border:2px solid #444;

font-size:30px;

color:#555;

transition:.4s;

}

.star.active{

background:gold;

color:#111;

border-color:#FFD700;

box-shadow:0 0 18px gold;

}

.progress{

margin-top:30px;

height:15px;

background:#333;

border-radius:50px;

overflow:hidden;

}

.progress div{

height:100%;

width:0%;

background:linear-gradient(to right,#FFD700,#ffeb8a);

border-radius:50px;

transition:.5s;

}

.points{

margin-top:15px;

text-align:center;

font-size:22px;

color:white;

}

.points span{

color:#FFD700;

font-weight:bold;

}

.reward{

margin-top:25px;

background:#1b1b1b;

border:1px solid gold;

padding:15px;

border-radius:15px;

text-align:center;

color:#FFD700;

font-weight:bold;

}

.back{

margin-top:30px;

display:block;

text-align:center;

padding:15px;

border-radius:15px;

background:gold;

color:black;

font-weight:bold;

font-size:18px;

text-decoration:none;

transition:.3s;

}

.back:hover{

transform:scale(1.05);

}

</style>

</head>

<body>

<div class="card">

<div class="logo">
<img src="735043823_122232458936380788_691619389420209673_n (3).jpg">
</div>

<div class="title">
💳 Carte Fidélité
</div>

<div class="line"></div>

<div class="info">
👤 <span id="nom">Nom du client</span>
</div>

<div class="info">
📧 <span id="email">email@gmail.com</span>
</div>

<div class="line"></div>

<div class="stars">

<div class="star active">★</div>
<div class="star active">★</div>
<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>

<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>
<div class="star">★</div>

</div>

<div class="progress">

<div id="bar"></div>

</div>

<div class="points">

<span id="pts">2</span> / 10 Points

</div>

<div class="reward">

🎁 À partir de 10 points vous gagnez un repas gratuit.

</div>

<a href="index.html" class="back">

🏠 Retour

</a>

</div>

<script>

let points=2;

document.getElementById("pts").innerHTML=points;

document.getElementById("bar").style.width=(points*10)+"%";

</script>

</body>
</html>
