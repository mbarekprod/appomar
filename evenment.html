<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>🎉 الإيفينمونات</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #1a0a00;
            color: white;
            padding: 20px;
            text-align: center;
            margin: 0;
        }

        h1 {
            color: #f5c842;
            margin-bottom: 30px;
        }

        .events-wrapper {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .event-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid #f5c842;
            border-radius: 15px;
            padding: 15px;
            text-align: right;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .event-card img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
            max-height: 220px;
            object-fit: cover;
        }

        .event-card h3 {
            margin: 0 0 8px 0;
            color: #ff9800;
            font-size: 20px;
        }

        .event-card p.desc {
            margin: 5px 0 10px 0;
            line-height: 1.6;
            font-size: 15px;
            color: #eee;
        }

        .event-date {
            display: inline-block;
            background: linear-gradient(135deg, #ff9800, #e65100);
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .empty-msg {
            color: #ccc;
            margin-top: 40px;
        }

        a.back-link {
            display: inline-block;
            margin-top: 30px;
            color: gold;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>🎉 الإيفينمونات الجايين</h1>

    <div class="events-wrapper" id="events-wrapper">
        <p class="empty-msg">جارِ تحميل الإيفينمونات...</p>
    </div>

    <a href="index.html" class="back-link">⬅️ رجوع للموقع</a>

    <script type="module">
        import {
            collection,
            onSnapshot,
            query,
            orderBy
        } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

        import { db } from "./firebase.js";

        function formatDate(dateStr) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            if (isNaN(d)) return dateStr;
            return d.toLocaleDateString("ar-TN", { year: "numeric", month: "long", day: "numeric" });
        }

        function loadEvents() {
            const q = query(
                collection(db, "events"),
                orderBy("date", "asc")
            );

            onSnapshot(q, (snapshot) => {

                const wrapper = document.getElementById("events-wrapper");

                if (snapshot.empty) {
                    wrapper.innerHTML = '<p class="empty-msg">مفماش إيفينمونات حالياً، تابعونا قريب! 🎈</p>';
                    return;
                }

                wrapper.innerHTML = "";

                snapshot.forEach((docSnap) => {

                    const ev = docSnap.data();

                    wrapper.innerHTML += `
                        <div class="event-card">
                            ${ev.image ? `<img src="${ev.image}" alt="${ev.title}">` : ""}
                            <h3>${ev.title}</h3>
                            ${ev.description ? `<p class="desc">${ev.description}</p>` : ""}
                            <span class="event-date">📅 ${formatDate(ev.date)}${ev.time ? " - ⏰ " + ev.time : ""}</span>
                        </div>
                    `;
                });
            });
        }

        loadEvents();
    </script>

</body>
</html>
